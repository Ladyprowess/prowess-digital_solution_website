<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit & Cashflow Tracker, Prowess Digital Solutions</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f2f5f5}
.wph::placeholder{color:rgba(255,255,255,.65)!important}
input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.8;filter:invert(1)}
@media print{.noprint{display:none!important}}
</style>

<style>input,select,textarea{font-size:16px !important;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const {useState, useEffect} = React;
const COUNTRIES=[["Algeria","DA"],["Angola","Kz"],["Benin","CFA"],["Botswana","P"],["Burkina Faso","CFA"],["Burundi","Fr"],["Cabo Verde","Esc"],["Cameroon","CFA"],["Central African Republic","CFA"],["Chad","CFA"],["Comoros","Fr"],["Congo DR","FC"],["Congo Republic","CFA"],["Côte d'Ivoire","CFA"],["Djibouti","Fr"],["Egypt","E£"],["Equatorial Guinea","CFA"],["Eritrea","Nfk"],["Eswatini","L"],["Ethiopia","Br"],["Gabon","CFA"],["Gambia","D"],["Ghana","GH₵"],["Guinea","Fr"],["Guinea-Bissau","CFA"],["Kenya","KSh"],["Lesotho","L"],["Liberia","L$"],["Libya","LD"],["Madagascar","Ar"],["Malawi","MK"],["Mali","CFA"],["Mauritania","UM"],["Mauritius","₨"],["Morocco","MAD"],["Mozambique","MT"],["Namibia","N$"],["Niger","CFA"],["Nigeria","₦"],["Rwanda","Fr"],["São Tomé and Príncipe","Db"],["Senegal","CFA"],["Seychelles","₨"],["Sierra Leone","Le"],["Somalia","Sh"],["South Africa","R"],["South Sudan","£"],["Sudan","£"],["Tanzania","TSh"],["Togo","CFA"],["Tunisia","DT"],["Uganda","USh"],["Zambia","ZK"],["Zimbabwe","Z$"]];
const getSym=c=>(COUNTRIES.find(x=>x[0]===c)||["","₦"])[1];


const B="#507c80", DARK="#3a5c60", MID="#6a9ea3", LITE="#e8f4f5", LGRAY="#f2f5f5", MGRAY="#c8d8da", W="#fff";

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const SHORT=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const INCOME_CATS=["Service Income","Product Sales","Deposit Received","Commission","Referral Bonus","Refund Received","Other Income"];
const EXPENSE_CATS=["Materials / Stock","Staff Wages","Rent / Premises","Transport","Phone & Data","Generator Fuel","Marketing","Equipment / Tools","Professional Fees","Loan Repayment","Packaging","Utilities","Insurance","Subscriptions","Tax / Government","Miscellaneous"];
const ALL_CATS=[...INCOME_CATS,...EXPENSE_CATS];

const mkid = () => Math.random().toString(36).slice(2,9);
const num = v => { const x = parseFloat(String(v||"").replace(/,/g,"")); return isNaN(x)?0:x; };
const fmt = v => { const x=Math.round(num(v)); return x===0?"0":x.toLocaleString("en"); };
const fmtPct = v => v!==null && v!==undefined ? (num(v)*100).toFixed(1)+"%" : " ";

const lsGet = k => { try{const r=localStorage.getItem(k); return r?JSON.parse(r):null}catch{return null} };
const lsSet = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v))}catch{} };

// cross-device code validation
async function validateCode(code) {
  const key = code.trim().toUpperCase();
  // try server-side codes.json first
  try {
    const res = await fetch("/codes.json?t="+Date.now());
    if (res.ok) {
      const codes = await res.json();
      const c = codes[key];
      if (!c) return {valid:false, reason:"not_found"};
      if (c.status==="revoked") return {valid:false, reason:"revoked", name:c.name};
      if (c.type!=="forever" && c.expires && Date.now()>c.expires) return {valid:false, reason:"expired", name:c.name};
      return {valid:true, client:c};
    }
  } catch(e) {}
  // fallback: localStorage (same device as admin)
  try {
    const codes = lsGet("pds-client-codes") || {};
    const c = codes[key];
    if (!c) return {valid:false, reason:"not_found"};
    if (c.status==="revoked") return {valid:false, reason:"revoked", name:c.name};
    if (c.type!=="forever" && c.expires && Date.now()>c.expires) return {valid:false, reason:"expired", name:c.name};
    return {valid:true, client:c};
  } catch(e) {}
  return {valid:false, reason:"not_found"};
}

// ── blank data structures ────────────────────────────────────────────────
const newRow = () => ({id:mkid(), date:"", desc:"", cat:"", income:"", expense:"", note:""});
const newMonth = () => ({target:"", openBalance:"", notes:"", rows: Array.from({length:15}, newRow)});

const makeDefault = () => ({
  info: {biz:"", trade:"", year:"2026", country:"Nigeria"},
  months: MONTHS.map(() => newMonth()),
  forecast: MONTHS.map(() => ({svc:"", product:"", other:"", fixed:"", variable:"", marketing:"", loan:"", otherExp:""}))
});

// ── Access Gate ──────────────────────────────────────────────────────────
function AccessGate({onAccess}) {
  const [code, setCode] = useState("");
  const [status, setStatus] = useState("idle");
  const [errMsg, setErrMsg] = useState("");
  const [focused, setFocused] = useState(false);

  useEffect(() => {
    const saved = localStorage.getItem("pds-tracker-session");
    if (saved) { setCode(saved); doCheck(saved); }
  }, []);

  const doCheck = async (c) => {
    const val = c || code;
    if (!val.trim()) return;
    setStatus("checking");
    const r = await validateCode(val);
    if (r.valid) {
      localStorage.setItem("pds-tracker-session", val.trim().toUpperCase());
      onAccess(r.client);
    } else {
      const msgs = {
        not_found: "Code not found. Please check and try again.",
        revoked: "Access for this code has been restricted. Contact Prowess Digital Solutions.",
        expired: "Your access has expired. Contact Prowess Digital Solutions."
      };
      setErrMsg(msgs[r.reason] || "Invalid code.");
      setStatus(r.reason === "revoked" ? "revoked" : r.reason === "expired" ? "expired" : "error");
    }
  };

  if (status === "revoked" || status === "expired") {
    return (
      <div style={{minHeight:"100vh", background:`linear-gradient(145deg,${DARK},#0f2627)`, display:"flex", alignItems:"center", justifyContent:"center", padding:20}}>
        <div style={{maxWidth:400, width:"100%", background:"rgba(255,255,255,.06)", borderRadius:16, padding:"32px 28px", border:"1px solid rgba(255,255,255,.1)", textAlign:"center"}}>
          <div style={{fontSize:40, marginBottom:12}}>{status==="revoked"?"🚫":"⏰"}</div>
          <div style={{fontSize:15, fontWeight:700, color:"#ff8a80", marginBottom:10}}>{status==="revoked"?"Access Restricted":"Access Expired"}</div>
          <div style={{fontSize:13, color:"rgba(255,255,255,.6)", lineHeight:1.6}}>{errMsg}</div>
          <button onClick={()=>{setStatus("idle");setCode("");setErrMsg("");}} style={{marginTop:20, padding:"9px 22px", background:"rgba(255,255,255,.1)", color:"#fff", border:"1px solid rgba(255,255,255,.2)", borderRadius:8, fontSize:13, cursor:"pointer", fontWeight:600}}>Try Different Code</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh", background:`linear-gradient(145deg,${DARK},#0f2627)`, display:"flex", alignItems:"center", justifyContent:"center", padding:20}}>
      <div style={{maxWidth:420, width:"100%"}}>
        <div style={{textAlign:"center", marginBottom:28}}>
          <div style={{width:64, height:64, background:"rgba(255,255,255,.1)", borderRadius:18, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 14px", fontSize:30, border:"2px solid rgba(255,255,255,.15)"}}>📊</div>
          <div style={{fontSize:11, fontWeight:700, color:MID, letterSpacing:1.6, textTransform:"uppercase", marginBottom:6}}>Prowess Digital Solutions</div>
          <div style={{fontSize:24, fontWeight:900, color:"#fff", marginBottom:4}}>Profit & Cashflow Tracker</div>
          <div style={{fontSize:13, color:"rgba(255,255,255,.5)"}}>Enter your access code to continue</div>
        </div>
        <div style={{background:"rgba(255,255,255,.06)", borderRadius:16, padding:"26px 28px", border:"1px solid rgba(255,255,255,.1)"}}>
          <label style={{fontSize:12, fontWeight:700, color:"rgba(255,255,255,.7)", display:"block", marginBottom:8, textTransform:"uppercase", letterSpacing:.8}}>Your Access Code</label>
          <input
            value={code} placeholder="PDS-XXXX-XXXX"
            onChange={e => setCode(e.target.value.toUpperCase())}
            onKeyDown={e => e.key==="Enter" && doCheck()}
            onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
            style={{width:"100%", padding:"13px 16px", background:"rgba(255,255,255,.08)", border:`2px solid ${focused?MID:"rgba(255,255,255,.15)"}`, borderRadius:10, color:"#fff", fontSize:16, fontWeight:700, outline:"none", boxSizing:"border-box", letterSpacing:2, fontFamily:"'Courier New',monospace", textAlign:"center"}}
          />
          {status==="error" && <div style={{color:"#ff8a80", fontSize:12, marginTop:8, fontWeight:600, textAlign:"center"}}>{errMsg}</div>}
          <button onClick={() => doCheck()} style={{marginTop:14, width:"100%", padding:"13px", background:code.trim()?B:"rgba(255,255,255,.1)", color:"#fff", border:"none", borderRadius:10, fontWeight:800, fontSize:14, cursor:"pointer"}}>
            {status==="checking" ? "Checking..." : "Access App →"}
          </button>
          <p style={{textAlign:"center", fontSize:11, color:"rgba(255,255,255,.3)", margin:"12px 0 0"}}>Code provided by Prowess Digital Solutions on registration.</p>
        </div>
      </div>
    </div>
  );
}

// ── Shared UI helpers ────────────────────────────────────────────────────
const card = {background:W, borderRadius:12, padding:"18px 22px", boxShadow:"0 1px 6px rgba(58,92,96,.10)", border:`1px solid ${MGRAY}`, marginBottom:14};
const TH = {background:B, color:W, padding:"9px 10px", fontWeight:700, fontSize:12, textAlign:"left", whiteSpace:"nowrap"};
const TD = alt => ({padding:"6px 8px", fontSize:13, color:DARK, background:alt?LGRAY:W, borderBottom:`1px solid ${LGRAY}`});

function Inp({val, set, ph="", type="text", right=false, sm=false}) {
  const [f,sf] = useState(false);
  return (
    <input type={type} value={val||""} placeholder={ph} onChange={e=>set(e.target.value)}
      onFocus={()=>sf(true)} onBlur={()=>sf(false)}
      style={{padding:sm?"5px 7px":"8px 10px", border:`1.5px solid ${f?B:MGRAY}`, borderRadius:7, fontSize:sm?12:13, width:"100%", outline:"none", boxSizing:"border-box", textAlign:right?"right":"left"}}
    />
  );
}

function Sel({val, set, opts, sm=false}) {
  return (
    <select value={val||""} onChange={e=>set(e.target.value)}
      style={{padding:sm?"5px 6px":"8px 10px", border:`1.5px solid ${MGRAY}`, borderRadius:7, fontSize:sm?12:13, width:"100%", outline:"none", background:W}}>
      <option value="">choose  </option>
      {opts.map(o => <option key={o} value={o}>{o}</option>)}
    </select>
  );
}

function KPI({label, val, sub, accent, warn, green}) {
  const bg = warn?"#fdecea" : green?"#e8f5e9" : accent?B : LITE;
  const tc = warn?"#c0392b" : green?"#2e7d32" : accent?W : DARK;
  const sc = warn?"#c0392b" : green?"#388e3c" : accent?"rgba(255,255,255,.7)" : MID;
  return (
    <div style={{background:bg, borderRadius:10, padding:"14px 16px", border:`1px solid ${warn?"#f5c6cb":green?"#a5d6a7":accent?DARK:MGRAY}`}}>
      <div style={{fontSize:10, fontWeight:700, color:sc, textTransform:"uppercase", letterSpacing:.8, marginBottom:4}}>{label}</div>
      <div style={{fontSize:20, fontWeight:800, color:tc}}>{val}</div>
      {sub && <div style={{fontSize:11, color:sc, marginTop:3}}>{sub}</div>}
    </div>
  );
}

// ── Monthly tracker view ─────────────────────────────────────────────────
function MonthView({mIdx, d, sd, clientName, sym="₦"}) {
  const mo = d.months[mIdx];
  const year = d.info.year || "2026";

  const upMo = (f, v) => sd(prev => {
    const months = prev.months.map((m,i) => i===mIdx ? {...m, [f]:v} : m);
    return {...prev, months};
  });

  const upRow = (id, f, v) => sd(prev => {
    const months = prev.months.map((m,i) => {
      if (i!==mIdx) return m;
      return {...m, rows: m.rows.map(r => r.id===id ? {...r,[f]:v} : r)};
    });
    return {...prev, months};
  });

  const addRow = () => sd(prev => {
    const months = prev.months.map((m,i) => i===mIdx ? {...m, rows:[...m.rows, newRow()]} : m);
    return {...prev, months};
  });

  const delRow = id => sd(prev => {
    const months = prev.months.map((m,i) => i===mIdx ? {...m, rows:m.rows.filter(r=>r.id!==id)} : m);
    return {...prev, months};
  });

  const totalIncome = mo.rows.reduce((a,r)=>a+num(r.income),0);
  const totalExpense = mo.rows.reduce((a,r)=>a+num(r.expense),0);
  const profit = totalIncome - totalExpense;
  const margin = totalIncome>0 ? profit/totalIncome : null;
  const tgt = num(mo.target);
  const openBal = num(mo.openBalance);
  const closingBal = openBal + profit;

  // running balance
  let running = openBal;
  const rowsWithBal = mo.rows.map(r => {
    running += num(r.income) - num(r.expense);
    return {...r, bal:running};
  });

  // category breakdown
  const byIncome = INCOME_CATS.map(c=>({cat:c, total:mo.rows.filter(r=>r.cat===c).reduce((a,r)=>a+num(r.income),0)})).filter(c=>c.total>0);
  const byExpense = EXPENSE_CATS.map(c=>({cat:c, total:mo.rows.filter(r=>r.cat===c).reduce((a,r)=>a+num(r.expense),0)})).filter(c=>c.total>0);

  return (
    <div>
      {/* KPIs */}
      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10, marginBottom:14}}>
        <KPI accent label="Total Income" val={`${sym}${fmt(totalIncome)}`} sub={tgt>0?`${fmtPct(tgt>0?totalIncome/tgt:0)} of ${sym}${fmt(tgt)} target`:undefined}/>
        <KPI label="Total Expenses" val={`${sym}${fmt(totalExpense)}`}/>
        <KPI accent={profit>=0} warn={profit<0} label="Gross Profit" val={profit>=0?`${sym}${fmt(profit)}`:`(${sym}${fmt(Math.abs(profit))})`}/>
        <KPI green={margin!==null&&margin>=0.2} warn={margin!==null&&margin<0} label="Profit Margin" val={fmtPct(margin)}/>
      </div>

      {/* Target + Balance */}
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14}}>
        <div style={{...card, marginBottom:0, padding:"14px 16px"}}>
          <label style={{fontSize:12, fontWeight:700, color:DARK, display:"block", marginBottom:6}}>Income Target, {MONTHS[mIdx]}</label>
          <Inp val={mo.target} set={v=>upMo("target",v)} type="number" ph="Set your income goal" right/>
          {tgt>0 && <div style={{marginTop:8}}>
            <div style={{height:6, background:LGRAY, borderRadius:3, overflow:"hidden"}}>
              <div style={{height:"100%", width:`${Math.min(totalIncome/tgt*100,100)}%`, background:totalIncome>=tgt?"#27ae60":B, borderRadius:3}}/>
            </div>
            <div style={{marginTop:5, fontSize:12, color:totalIncome>=tgt?"#27ae60":MID, fontWeight:600}}>
              {totalIncome>=tgt ? "✓ Target reached!" : `${sym}${fmt(tgt-totalIncome)} still to go`}
            </div>
          </div>}
        </div>
        <div style={{...card, marginBottom:0, padding:"14px 16px"}}>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
            <div>
              <label style={{fontSize:12, fontWeight:700, color:DARK, display:"block", marginBottom:6}}>Opening Balance</label>
              <Inp val={mo.openBalance} set={v=>upMo("openBalance",v)} type="number" ph="Cash at start" right/>
            </div>
            <div>
              <div style={{fontSize:12, fontWeight:700, color:DARK, marginBottom:6}}>Closing Balance</div>
              <div style={{padding:"8px 10px", background:closingBal<0?"#fdecea":LITE, borderRadius:7, fontSize:15, fontWeight:800, color:closingBal<0?"#c0392b":DARK, textAlign:"right"}}>{sym}{fmt(closingBal)}</div>
            </div>
          </div>
        </div>
      </div>

      {/* Transactions */}
      <div style={{...card, padding:0, overflow:"hidden", marginBottom:14}}>
        <div style={{background:DARK, padding:"11px 16px", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <span style={{color:W, fontWeight:700, fontSize:14}}>{MONTHS[mIdx]} Transactions</span>
          <span style={{color:"rgba(255,255,255,.45)", fontSize:12}}>One row per payment in or out</span>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%", borderCollapse:"collapse", minWidth:660}}>
            <thead>
              <tr>
                <th style={{...TH, width:"11%"}}>Date</th>
                <th style={{...TH, width:"22%"}}>Description</th>
                <th style={{...TH, width:"16%"}}>Category</th>
                <th style={{...TH, textAlign:"right", width:"11%"}}>Income ({sym})</th>
                <th style={{...TH, textAlign:"right", width:"11%"}}>Expense ({sym})</th>
                <th style={{...TH, textAlign:"right", width:"11%"}}>Balance</th>
                <th style={{...TH, width:"14%"}}>Note</th>
                <th style={{...TH, width:"4%"}}></th>
              </tr>
            </thead>
            <tbody>
              {rowsWithBal.map((r,i) => {
                const hasData = num(r.income)||num(r.expense);
                return (
                  <tr key={r.id} style={{background:i%2===0?W:LGRAY}}>
                    <td style={TD(i%2)}>
                      <input type="date" value={r.date||""} onChange={e=>upRow(r.id,"date",e.target.value)}
                        style={{padding:"5px 6px", border:`1.5px solid ${MGRAY}`, borderRadius:6, fontSize:12, width:"100%", outline:"none", background:"transparent", cursor:"pointer"}}/>
                    </td>
                    <td style={TD(i%2)}><Inp val={r.desc} set={v=>upRow(r.id,"desc",v)} ph="What was this for?" sm/></td>
                    <td style={TD(i%2)}><Sel val={r.cat} set={v=>upRow(r.id,"cat",v)} opts={ALL_CATS} sm/></td>
                    <td style={TD(i%2)}><Inp val={r.income} set={v=>upRow(r.id,"income",v)} type="number" right sm/></td>
                    <td style={TD(i%2)}><Inp val={r.expense} set={v=>upRow(r.id,"expense",v)} type="number" right sm/></td>
                    <td style={{...TD(i%2), textAlign:"right", fontWeight:700, color:!hasData?"#ccc":r.bal>=0?DARK:"#c0392b"}}>
                      {hasData ? `${sym}${fmt(r.bal)}` : " "}
                    </td>
                    <td style={TD(i%2)}><Inp val={r.note} set={v=>upRow(r.id,"note",v)} ph="Optional" sm/></td>
                    <td style={TD(i%2)}>
                      <button onClick={()=>delRow(r.id)} style={{background:"none", border:"none", cursor:"pointer", color:"#e74c3c", fontSize:17, lineHeight:1, padding:"0 2px"}}>×</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{padding:"9px 16px", borderTop:`1px solid ${LGRAY}`, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <button onClick={addRow} style={{background:"transparent", border:`1.5px dashed ${MID}`, borderRadius:8, color:MID, fontSize:13, fontWeight:600, cursor:"pointer", padding:"6px 14px"}}>+ Add Transaction</button>
          <span style={{fontSize:12, color:MID}}>{mo.rows.filter(r=>r.desc||r.income||r.expense).length} entries</span>
        </div>
      </div>

      {/* Monthly Summary */}
      <div style={{...card, border:`2px solid ${B}`}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:10}}>
          <div>
            <div style={{fontSize:15, fontWeight:800, color:DARK}}>{MONTHS[mIdx]} {year}, Monthly Summary</div>
            <div style={{fontSize:12, color:MID, marginTop:2}}>{d.info.biz||"Your Business"} · {clientName}</div>
          </div>
          <button onClick={()=>window.print()} className="noprint" style={{padding:"7px 14px", background:B, color:W, border:"none", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer"}}>🖨 Print Summary</button>
        </div>

        <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))", gap:10, marginBottom:16}}>
          {[
            ["Total Income", `${sym}${fmt(totalIncome)}`, LITE],
            ["Total Expenses", `${sym}${fmt(totalExpense)}`, LGRAY],
            ["Net Profit", profit>=0?`${sym}${fmt(profit)}`:`(${sym}${fmt(Math.abs(profit))})`, profit>=0?"#e8f5e9":"#fdecea"],
            ["Profit Margin", fmtPct(margin), LITE],
            ["Closing Balance", `${sym}${fmt(closingBal)}`, closingBal<0?"#fdecea":LITE],
          ].map(([l,v,bg])=>(
            <div key={l} style={{background:bg, borderRadius:8, padding:"11px 13px"}}>
              <div style={{fontSize:10, fontWeight:700, color:MID, textTransform:"uppercase", marginBottom:4}}>{l}</div>
              <div style={{fontSize:17, fontWeight:800, color:DARK}}>{v}</div>
            </div>
          ))}
        </div>

        {/* Category breakdown */}
        {(byIncome.length>0||byExpense.length>0) && (
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14}}>
            <div>
              <div style={{fontSize:12, fontWeight:700, color:DARK, textTransform:"uppercase", letterSpacing:.5, marginBottom:8}}>Income Breakdown</div>
              {byIncome.length===0 ? <div style={{fontSize:12, color:"#aaa"}}>No income recorded</div> :
                byIncome.map((c,i) => (
                  <div key={c.cat} style={{display:"flex", justifyContent:"space-between", padding:"7px 10px", background:i%2===0?LITE:W, borderRadius:5, marginBottom:3}}>
                    <span style={{fontSize:13, color:DARK}}>{c.cat}</span>
                    <div>
                      <span style={{fontSize:13, fontWeight:700, color:"#27ae60"}}>{sym}{fmt(c.total)}</span>
                      <span style={{fontSize:11, color:MID, marginLeft:6}}>{totalIncome>0?Math.round(c.total/totalIncome*100):0}%</span>
                    </div>
                  </div>
                ))
              }
              {byIncome.length>0 && <div style={{display:"flex", justifyContent:"space-between", padding:"8px 10px", background:B, borderRadius:5, marginTop:4}}>
                <span style={{fontSize:13, fontWeight:700, color:W}}>Total</span>
                <span style={{fontSize:13, fontWeight:700, color:W}}>{sym}{fmt(totalIncome)}</span>
              </div>}
            </div>
            <div>
              <div style={{fontSize:12, fontWeight:700, color:DARK, textTransform:"uppercase", letterSpacing:.5, marginBottom:8}}>Expense Breakdown</div>
              {byExpense.length===0 ? <div style={{fontSize:12, color:"#aaa"}}>No expenses recorded</div> :
                byExpense.map((c,i) => (
                  <div key={c.cat} style={{display:"flex", justifyContent:"space-between", padding:"7px 10px", background:i%2===0?LGRAY:W, borderRadius:5, marginBottom:3}}>
                    <span style={{fontSize:13, color:DARK}}>{c.cat}</span>
                    <div>
                      <span style={{fontSize:13, fontWeight:700, color:"#c0392b"}}>{sym}{fmt(c.total)}</span>
                      <span style={{fontSize:11, color:MID, marginLeft:6}}>{totalExpense>0?Math.round(c.total/totalExpense*100):0}%</span>
                    </div>
                  </div>
                ))
              }
              {byExpense.length>0 && <div style={{display:"flex", justifyContent:"space-between", padding:"8px 10px", background:DARK, borderRadius:5, marginTop:4}}>
                <span style={{fontSize:13, fontWeight:700, color:W}}>Total</span>
                <span style={{fontSize:13, fontWeight:700, color:W}}>{sym}{fmt(totalExpense)}</span>
              </div>}
            </div>
          </div>
        )}

        {/* Notes */}
        <div>
          <label style={{fontSize:12, fontWeight:700, color:DARK, textTransform:"uppercase", letterSpacing:.5, display:"block", marginBottom:6}}>Notes for {MONTHS[mIdx]}</label>
          <textarea value={mo.notes||""} onChange={e=>upMo("notes",e.target.value)}
            placeholder={`What went well this month? What cost too much? What will you do differently in ${mIdx<11?MONTHS[mIdx+1]:"January"}?`}
            rows={3}
            style={{width:"100%", padding:"10px 13px", border:`1.5px solid ${MGRAY}`, borderRadius:8, fontSize:13, lineHeight:1.6, outline:"none", resize:"vertical", fontFamily:"inherit", color:DARK}}/>
        </div>
      </div>
    </div>
  );
}

// ── Annual Summary ───────────────────────────────────────────────────────
function AnnualSummary({d, sym="₦"}) {
  const stats = d.months.map((mo,i) => ({
    name:MONTHS[i], short:SHORT[i],
    income: mo.rows.reduce((a,r)=>a+num(r.income),0),
    expense: mo.rows.reduce((a,r)=>a+num(r.expense),0),
    target: num(mo.target),
  }));
  stats.forEach(s => { s.profit = s.income - s.expense; s.margin = s.income>0?s.profit/s.income:null; });
  const totI=stats.reduce((a,s)=>a+s.income,0), totE=stats.reduce((a,s)=>a+s.expense,0), totP=totI-totE;
  const annM = totI>0?totP/totI:null;
  const best = stats.reduce((a,s)=>s.profit>a.profit?s:a, stats[0]);

  return (
    <div>
      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10, marginBottom:16}}>
        <KPI accent label="Annual Income" val={`${sym}${fmt(totI)}`}/>
        <KPI label="Annual Expenses" val={`${sym}${fmt(totE)}`}/>
        <KPI accent={totP>=0} warn={totP<0} label="Annual Profit" val={totP>=0?`${sym}${fmt(totP)}`:`(${sym}${fmt(Math.abs(totP))})`}/>
        <KPI green={annM!==null&&annM>=0.2} label="Annual Margin" val={fmtPct(annM)}/>
      </div>
      <div style={{...card, padding:0, overflow:"hidden"}}>
        <div style={{background:DARK, padding:"11px 16px", color:W, fontWeight:700, fontSize:14}}>Month-by-Month</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%", borderCollapse:"collapse", minWidth:580}}>
            <thead><tr>
              {["Month","Income","Expenses","Profit / (Loss)","Margin","vs Prior Month","Target"].map((h,i)=>(
                <th key={i} style={{...TH, textAlign:i===0?"left":"right"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {stats.map((s,i) => {
                const prev = i>0?stats[i-1]:null;
                const delta = prev ? s.profit-prev.profit : null;
                const hasData = s.income>0||s.expense>0;
                return (
                  <tr key={s.name} style={{background:i%2===0?W:LGRAY}}>
                    <td style={{...TD(i%2), fontWeight:600}}>{s.name}</td>
                    <td style={{...TD(i%2), textAlign:"right"}}>{hasData?`${sym}${fmt(s.income)}`:" "}</td>
                    <td style={{...TD(i%2), textAlign:"right"}}>{hasData?`${sym}${fmt(s.expense)}`:" "}</td>
                    <td style={{...TD(i%2), textAlign:"right", fontWeight:700, color:!hasData?"#ccc":s.profit>=0?"#27ae60":"#c0392b"}}>
                      {hasData ? (s.profit>=0?`${sym}${fmt(s.profit)}`:`(${sym}${fmt(Math.abs(s.profit))})`) : " "}
                    </td>
                    <td style={{...TD(i%2), textAlign:"right", color:!hasData?"#ccc":s.margin!==null&&s.margin>=0.2?"#27ae60":"#c0392b"}}>
                      {hasData&&s.margin!==null ? fmtPct(s.margin) : " "}
                    </td>
                    <td style={{...TD(i%2), textAlign:"right", color:delta===null||!hasData?"#ccc":delta>=0?"#27ae60":"#c0392b", fontWeight:600}}>
                      {delta!==null&&hasData ? (delta>=0?`+${sym}${fmt(delta)}`:`-${sym}${fmt(Math.abs(delta))}`) : " "}
                    </td>
                    <td style={{...TD(i%2), textAlign:"right"}}>
                      {s.target>0 ? (s.income>=s.target?"✓":"✗") : " "}
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{background:DARK}}>
                <td style={{padding:"9px 10px", color:W, fontWeight:700}}>ANNUAL TOTAL</td>
                <td style={{padding:"9px 10px", color:W, fontWeight:700, textAlign:"right"}}>{sym}{fmt(totI)}</td>
                <td style={{padding:"9px 10px", color:W, fontWeight:700, textAlign:"right"}}>{sym}{fmt(totE)}</td>
                <td style={{padding:"9px 10px", color:W, fontWeight:700, textAlign:"right"}}>{totP>=0?`${sym}${fmt(totP)}`:`(${sym}${fmt(Math.abs(totP))})`}</td>
                <td style={{padding:"9px 10px", color:W, fontWeight:700, textAlign:"right"}}>{fmtPct(annM)}</td>
                <td colSpan={2} style={{padding:"9px 10px", color:"rgba(255,255,255,.4)", fontSize:12, textAlign:"right"}}>{stats.filter(s=>s.income>0||s.expense>0).length} active months</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
      {totI>0 && (
        <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10, marginTop:4}}>
          {[["Best Month",best.name,`${sym}${fmt(best.profit)} profit`],["Monthly Avg Income",`${sym}${fmt(Math.round(totI/12))}`,"per month on average"],["Expense Ratio",fmtPct(totI>0?totE/totI:null),"of income spent on costs"]].map(([l,v,sub])=>(
            <div key={l} style={{background:W, borderRadius:10, border:`1px solid ${MGRAY}`, padding:"14px 16px"}}>
              <div style={{fontSize:10, fontWeight:700, color:MID, textTransform:"uppercase", letterSpacing:.5, marginBottom:6}}>{l}</div>
              <div style={{fontSize:20, fontWeight:800, color:DARK}}>{v}</div>
              <div style={{fontSize:12, color:MID, marginTop:3}}>{sub}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Cashflow Forecast ────────────────────────────────────────────────────
function Forecast({d, sd, sym="₦"}) {
  const upF = (mi, f, v) => sd(prev => {
    const forecast = prev.forecast.map((m,i) => i===mi ? {...m,[f]:v} : m);
    return {...prev, forecast};
  });

  const rows = d.forecast.map(f => ({
    inc: num(f.svc)+num(f.product)+num(f.other),
    exp: num(f.fixed)+num(f.variable)+num(f.marketing)+num(f.loan)+num(f.otherExp)
  }));

  let running = num(d.months[0].openBalance)||0;
  const withBal = rows.map(r => { const open=running; running=open+r.inc-r.exp; return {...r, open, close:running, net:r.inc-r.exp}; });
  const annI=rows.reduce((a,r)=>a+r.inc,0), annE=rows.reduce((a,r)=>a+r.exp,0);
  const negCount = withBal.filter(r=>r.close<0).length;

  const THF = {background:B, color:W, padding:"7px 8px", fontWeight:700, fontSize:11, textAlign:"right", minWidth:78, whiteSpace:"nowrap"};
  const THL = {background:DARK, color:W, padding:"7px 10px", fontWeight:700, fontSize:11, textAlign:"left", width:"17%"};

  return (
    <div>
      <div style={{...card, background:LITE, border:`1.5px solid ${B}`, padding:"14px 18px"}}>
        <p style={{margin:0, fontSize:13, color:DARK, lineHeight:1.7}}>
          <b>Cashflow Forecast</b>, enter what you <i>expect</i> to earn and spend each month. The tool shows your projected cash balance. Negative closing balance means you need to plan now.
        </p>
      </div>
      {negCount>0 && <div style={{...card, background:"#fdecea", border:"1.5px solid #f5c6cb", padding:"12px 16px"}}>
        <p style={{margin:0, fontSize:13, fontWeight:700, color:"#c0392b"}}>⚠ {negCount} month{negCount>1?"s":""} forecast to go negative. Plan how to cover these shortfalls before they arrive.</p>
      </div>}
      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10, marginBottom:14}}>
        <KPI accent label="Forecast Annual Income" val={`${sym}${fmt(annI)}`}/>
        <KPI label="Forecast Annual Expenses" val={`${sym}${fmt(annE)}`}/>
        <KPI accent={annI>=annE} warn={annI<annE} label="Forecast Net" val={`${sym}${fmt(annI-annE)}`}/>
      </div>

      {[
        ["Income Forecast",[["Service Income","svc"],["Product Sales","product"],["Other Income","other"]],"inc","#2e7d32"],
        ["Expense Forecast",[["Fixed Costs","fixed"],["Variable / Materials","variable"],["Marketing","marketing"],["Loan Repayments","loan"],["Other Expenses","otherExp"]],"exp","#c0392b"]
      ].map(([title,fields,totKey,totCol]) => (
        <div key={title} style={{...card, padding:0, overflow:"hidden"}}>
          <div style={{background:DARK, padding:"10px 14px", color:W, fontWeight:700, fontSize:13}}>{title}</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%", borderCollapse:"collapse"}}>
              <thead><tr>
                <th style={THL}></th>
                {MONTHS.map(m=><th key={m} style={THF}>{m.slice(0,3)}</th>)}
              </tr></thead>
              <tbody>
                {fields.map(([l,f],ri) => (
                  <tr key={f} style={{background:ri%2===0?W:LGRAY}}>
                    <td style={{padding:"5px 10px", fontSize:13, fontWeight:600, color:DARK}}>{l}</td>
                    {d.forecast.map((_,mi) => (
                      <td key={mi} style={{padding:"3px 4px"}}>
                        <input type="number" value={d.forecast[mi][f]||""} onChange={e=>upF(mi,f,e.target.value)}
                          style={{padding:"4px 6px", border:`1.5px solid ${MGRAY}`, borderRadius:6, fontSize:12, width:"100%", outline:"none", textAlign:"right"}}/>
                      </td>
                    ))}
                  </tr>
                ))}
                <tr style={{background:LITE}}>
                  <td style={{padding:"7px 10px", fontSize:13, fontWeight:700, color:DARK}}>TOTAL</td>
                  {withBal.map((r,i) => <td key={i} style={{padding:"7px 8px", textAlign:"right", fontSize:13, fontWeight:700, color:totCol}}>{sym}{fmt(r[totKey])}</td>)}
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      ))}

      <div style={{...card, padding:0, overflow:"hidden"}}>
        <div style={{background:B, padding:"10px 14px", color:W, fontWeight:700, fontSize:13}}>Monthly Cash Position</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%", borderCollapse:"collapse"}}>
            <thead><tr>
              <th style={{...THL, background:DARK}}></th>
              {MONTHS.map(m=><th key={m} style={{...THF, background:DARK}}>{m.slice(0,3)}</th>)}
            </tr></thead>
            <tbody>
              {[["Net Cashflow","net",false],["Opening Balance","open",false],["Closing Balance","close",true]].map(([l,k,strong],ri)=>(
                <tr key={l} style={{background:ri%2===0?W:LGRAY}}>
                  <td style={{padding:"7px 10px", fontSize:13, fontWeight:strong?700:500, color:DARK}}>{l}</td>
                  {withBal.map((r,i) => {
                    const v=r[k], neg=v<0;
                    return <td key={i} style={{padding:"7px 8px", textAlign:"right", fontSize:13, fontWeight:strong?700:400, color:neg?"#c0392b":strong?DARK:MID, background:neg&&strong?"#fdecea":"transparent"}}>{sym}{fmt(v)}</td>;
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── App Shell ────────────────────────────────────────────────────────────
function TrackerApp() {
  const [client, setClient] = useState({name:"",business:""});
  const [view, setView] = useState("month");
  const [mIdx, setMIdx] = useState(new Date().getMonth());
  const [d, sd] = useState(null);
  const [saved, setSaved] = useState(false);
  const sym = d ? getSym(d.info.country||'Nigeria') : '₦';

  useEffect(() => {
    if (!client) return;
    const stored = lsGet("pds-tracker-data");
    sd(stored || makeDefault());
  }, [client]);

  useEffect(() => {
    if (!client || !d) return;
    lsSet("pds-tracker-data", d);
    setSaved(true);
    setTimeout(() => setSaved(false), 1800);
  }, [d]);

  // access handled by Next.js
  if (!d) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",fontSize:14,color:MID}}>Loading...</div>;

  const curMonth = d.months[mIdx];
  const curProfit = curMonth.rows.reduce((a,r)=>a+num(r.income)-num(r.expense),0);
  const hasData = curMonth.rows.some(r=>r.income||r.expense);

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif", minHeight:"100vh", background:LGRAY}}>

      {/* Header */}
      <div className="noprint" style={{background:DARK, padding:"13px 22px", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
        <div>
          <div style={{fontSize:10, fontWeight:700, color:"rgba(255,255,255,.6)", letterSpacing:1.2, textTransform:"uppercase"}}>Prowess Digital Solutions · 2026</div>
          <div style={{fontSize:18, fontWeight:800, color:W, marginTop:2}}>Profit & Cashflow Tracker</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:12, color:"rgba(255,255,255,.7)"}}>Prowess Digital Solutions</div>
          <div style={{fontSize:11, fontWeight:600, color:saved?"#81c784":"rgba(255,255,255,.4)", marginTop:2}}>{saved?"✓ Saved":"Auto-saving..."}</div>
        </div>
      </div>

      {/* Info bar */}
      <div className="noprint" style={{background:B, padding:"9px 22px", display:"flex", gap:10, alignItems:"center", flexWrap:"wrap"}}>
        {[["biz","Business Name",170],["trade","Trade / Service",170],["year","Year",90]].map(([f,p,w])=>(
          <input key={f} value={d.info[f]||""} placeholder={p} onChange={e=>sd(x=>({...x,info:{...x.info,[f]:e.target.value}}))} className="wph"
            style={{background:"rgba(255,255,255,.15)", border:"1.5px solid rgba(255,255,255,.4)", borderRadius:7, padding:"6px 11px", color:W, fontSize:13, fontWeight:600, outline:"none", width:w}}/>
        ))}
        <select value={d.info.country||"Nigeria"} onChange={e=>sd(x=>({...x,info:{...x.info,country:e.target.value}}))} className="wph"
          style={{background:"rgba(255,255,255,.15)",border:"1.5px solid rgba(255,255,255,.4)",borderRadius:7,padding:"6px 9px",color:W,fontSize:13,fontWeight:600,outline:"none",width:155,cursor:"pointer"}}>
          {COUNTRIES.map(([n])=><option key={n} value={n} style={{color:"#333"}}>{n}</option>)}
        </select>
        <div style={{marginLeft:"auto", display:"flex", gap:8}}>
          <a href="index.html" style={{padding:"6px 14px", background:"rgba(255,255,255,.15)", border:"1.5px solid rgba(255,255,255,.4)", borderRadius:7, color:W, fontSize:12, fontWeight:700, textDecoration:"none"}}>← Tools</a>
          <button onClick={()=>{localStorage.removeItem("pds-tracker-session");}} style={{padding:"6px 14px", background:"rgba(255,255,255,.15)", border:"1.5px solid rgba(255,255,255,.4)", borderRadius:7, color:W, fontSize:12, fontWeight:700, cursor:"pointer"}}>Sign Out</button>
        </div>
      </div>

      {/* View tabs */}
      <div className="noprint" style={{background:W, borderBottom:`2px solid ${MGRAY}`, display:"flex", padding:"0 22px", overflowX:"auto", gap:2, alignItems:"stretch"}}>
        {[["month","Monthly Tracker"],["annual","Annual Summary"],["forecast","Cashflow Forecast"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{padding:"12px 17px", background:"transparent", border:"none", cursor:"pointer", fontSize:14, fontWeight:700, whiteSpace:"nowrap", color:view===v?B:"#999", borderBottom:view===v?`3px solid ${B}`:"3px solid transparent", marginBottom:-2}}>{l}</button>
        ))}
        {/* Month tabs only for monthly view */}
        {view==="month" && (
          <div style={{display:"flex", marginLeft:10, alignItems:"center", gap:2, overflowX:"auto", borderLeft:`1px solid ${MGRAY}`, paddingLeft:10}}>
            {SHORT.map((s,i) => {
              const hasDat = d.months[i].rows.some(r=>r.income||r.expense);
              return (
                <button key={i} onClick={()=>setMIdx(i)}
                  style={{padding:"6px 10px", background:mIdx===i?B:"transparent", border:"none", cursor:"pointer", fontSize:12, fontWeight:700, borderRadius:6, color:mIdx===i?W:hasDat?DARK:"#bbb", whiteSpace:"nowrap"}}>
                  {s}
                </button>
              );
            })}
          </div>
        )}
      </div>

      {/* Content */}
      <div style={{padding:"18px 22px", maxWidth:1200, margin:"0 auto"}}>
        {view==="month" && (
          <div>
            <div style={{display:"flex", alignItems:"baseline", gap:12, marginBottom:14}}>
              <h2 style={{margin:0, color:DARK, fontSize:19, fontWeight:800}}>{MONTHS[mIdx]} {d.info.year||"2026"}</h2>
              {hasData && <span style={{fontSize:14, fontWeight:700, color:curProfit>=0?"#27ae60":"#c0392b"}}>
                {curProfit>=0?`${sym}${fmt(curProfit)} profit`:`${sym}${fmt(Math.abs(curProfit))} loss`}
              </span>}
            </div>
            <MonthView mIdx={mIdx} d={d} sd={sd} clientName={client.name} sym={sym}/>
          </div>
        )}
        {view==="annual" && <AnnualSummary d={d} sym={sym}/>}
        {view==="forecast" && <Forecast d={d} sd={sd} sym={sym}/>}
      </div>

      <div className="noprint" style={{textAlign:"center", padding:"14px", fontSize:12, color:"#aaa"}}>© 2026 Prowess Digital Solutions · prowessdigitalsolutions.com</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TrackerApp/>);

</script>
</body>
</html>
