const RANGES=[
  {id:"0-30",min:0,max:20},
  {id:"30-80",min:20,max:50},
  {id:"80-200",min:50,max:125},
  {id:"200-500",min:125,max:350},

function BusinessDetail({b,budget,sym="₦",country="Nigeria"}){
  const [bTab,setBTab]=useState("checklist");
  const [done,setDone]=useState({});
  const [name,category,templateKey,min,max,income]=b;
  const tmpl=TEMPLATES[templateKey];
  if(!tmpl)return null;
  const totalTasks=tmpl.checklist.reduce((a,w)=>a+w.tasks.length,0);
  const doneCnt=Object.values(done).filter(Boolean).length;
  const pct=totalTasks>0?Math.round(doneCnt/totalTasks*100):0;
  return(
    <div>
      {pct>0&&<div style={{padding:"10px 18px",background:LITE,borderBottom:`1px solid ${MGRAY}`}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <span style={{fontSize:12,fontWeight:700,color:DARK}}>Your Progress</span>
          <span style={{fontSize:12,fontWeight:700,color:B}}>{doneCnt}/{totalTasks} tasks ({pct}%)</span>
        </div>
        <div style={{height:7,background:MGRAY,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:B,borderRadius:4}}/></div>
      </div>}
      <div style={{display:"flex",background:LGRAY,borderBottom:`1px solid ${MGRAY}`}}>
        {[["checklist","📋 Checklist"],["costs","💰 Costs"],["tips","💡 Tips"]].map(([v,l])=>(
          <button key={v} onClick={()=>setBTab(v)} style={{padding:"10px 16px",background:bTab===v?W:"transparent",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:bTab===v?B:"#888",borderBottom:bTab===v?`3px solid ${B}`:"3px solid transparent",marginBottom:-1}}>{l}</button>
        ))}
      </div>
      <div style={{padding:"18px 18px"}}>
        {bTab==="checklist"&&<div>
          <p style={{fontSize:13,color:MID,marginBottom:14,lineHeight:1.6}}>Work through each step in order. Tick off as you go. Do not skip ahead, each week builds on the last.</p>
          {tmpl.checklist.map((week,wi)=>(
            <div key={wi} style={{marginBottom:14}}>
              <div style={{background:B,color:W,borderRadius:7,padding:"7px 13px",fontWeight:700,fontSize:13,marginBottom:8}}>{week.week}</div>
              {week.tasks.map((task,ti)=>{
                const key=`${wi}-${ti}`;
                return(
                  <div key={key} onClick={()=>setDone(d=>({...d,[key]:!d[key]}))}
                    style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 12px",background:done[key]?"#e8f5e9":W,borderRadius:7,marginBottom:5,cursor:"pointer",border:`1px solid ${done[key]?"#a5d6a7":MGRAY}`}}>
                    <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${done[key]?"#27ae60":MGRAY}`,background:done[key]?"#27ae60":W,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                      {done[key]&&<span style={{color:W,fontSize:12,fontWeight:700}}>✓</span>}
                    </div>
                    <span style={{fontSize:13,color:done[key]?"#555":DARK,lineHeight:1.5,textDecoration:done[key]?"line-through":"none"}}>{applyS(task,sym)}</span>
                  </div>
                );
              })}
            </div>
          ))}
        </div>}
        {bTab==="costs"&&<div>
          <div style={{background:LITE,borderRadius:9,padding:"13px 15px",marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:MID,marginBottom:4}}>Typical startup cost range</div>
            <div style={{fontSize:20,fontWeight:800,color:B}}>{rangeLocal(min,max,country)}</div>
            <div style={{fontSize:12,color:MID,marginTop:4}}>{tmpl.capital.replace(/\$(\d+) to \$(\d+)/,(m,a,b)=>rangeLocal(+a,+b,country)).replace(/ USD/g,"")}</div>
            {budget>0&&<div style={{marginTop:10}}>
              <div style={{height:6,background:LGRAY,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(budget/max*100,100)}%`,background:budget>=min?B:"#e74c3c",borderRadius:3}}/></div>
              <div style={{fontSize:12,fontWeight:700,marginTop:5,color:budget>=min?"#27ae60":"#c0392b"}}>{budget>=min?budget>=max?"Budget fully covers this":"Budget covers the minimum, start lean":"Budget may be short for this business"}</div>
            </div>}
          </div>
          <div style={{background:LITE,borderRadius:9,padding:"13px 15px"}}>
            <div style={{fontSize:12,fontWeight:700,color:MID,marginBottom:4}}>Expected monthly income</div>
            <div style={{fontSize:18,fontWeight:800,color:DARK}}>{income.replace(/\$(\d+) to \$(\d+)/,(m,a,b)=>rangeLocal(+a,+b,country)).replace(/ USD/g,"")}</div>
            <div style={{fontSize:12,color:MID,marginTop:4}}>After costs, once you have built your client base</div>
          </div>
        </div>}
        {bTab==="tips"&&<div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:DARK,marginBottom:10}}>Key tips for this type of business</div>
            {tmpl.tips.map((tip,i)=>(
              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
                <div style={{width:24,height:24,background:LITE,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,fontWeight:700,color:B}}>{i+1}</div>
                <span style={{fontSize:13,color:DARK,lineHeight:1.5}}>{applyS(tip,sym)}</span>
              </div>
            ))}
          </div>
          <div style={{background:"#fdecea",borderRadius:9,padding:"12px 14px",borderLeft:"4px solid #c0392b"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#c0392b",marginBottom:4}}>Key risk to know</div>
            <div style={{fontSize:13,color:"#c0392b",lineHeight:1.6}}>{applyS(tmpl.warning,sym)}</div>
          </div>
        </div>}
      </div>
    </div>
  );
}

function BusinessRow({b,budget,catColor,catBorder,sym="₦",country="Nigeria"}){
  const [open,setOpen]=useState(false);
  const [name,category,templateKey,min,max,income]=b;
  const feasible=budget===0||budget>=min;
  const tight=budget>0&&budget>=min&&budget<max;
  return(
    <div style={{background:W,border:`1.5px solid ${open?catBorder:MGRAY}`,borderRadius:10,marginBottom:8,overflow:"hidden"}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{width:"100%",padding:"12px 16px",background:"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
        <span style={{fontSize:24}}>{b[1]}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:DARK}}>{name}</div>
          <div style={{fontSize:12,color:MID,marginTop:2}}>{income.replace(/\$(\d+) to \$(\d+)/,(m,a,b)=>rangeLocal(+a,+b,country)).replace(/ USD/g,"")}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
          {tight&&<span style={{background:"#fff3e0",color:"#e65100",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20}}>Tight</span>}
          {!feasible&&budget>0&&<span style={{background:"#fdecea",color:"#c0392b",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20}}>Over budget</span>}
          <span style={{fontSize:16,color:MID}}>{open?"▲":"▼"}</span>
        </div>
      </button>
      {open&&<div style={{borderTop:`1px solid ${LGRAY}`}}><BusinessDetail b={b} budget={budget} sym={sym} country={country}/></div>}
    </div>
  );
}

function CategorySection({cat,budget,search,sym="₦",country="Nigeria"}){
  const filtered=cat.businesses.filter(b=>{
    const [name,,, min]=b;
    if(search&&!name.toLowerCase().includes(search.toLowerCase()))return false;
    if(budget>0&&min>budget)return false;
    return true;
  });
  if(filtered.length===0)return null;
  const [open,setOpen]=useState(false);
  return(
    <div style={{background:W,borderRadius:14,border:`2px solid ${cat.border}`,marginBottom:14,overflow:"hidden"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",padding:"15px 20px",background:cat.color,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left"}}>
        <span style={{fontSize:28}}>{cat.emoji}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:800,color:DARK}}>{cat.label}</div>
          <div style={{fontSize:12,color:MID,marginTop:2}}>{filtered.length} business{filtered.length!==1?"es":""} shown · {cat.intro.slice(0,70)}...</div>
        </div>
        <span style={{fontSize:18,color:MID}}>{open?"▲":"▼"}</span>
      </button>
      {open&&<div style={{padding:"16px 18px"}}>
        <div style={{background:cat.color,borderLeft:`4px solid ${cat.border}`,borderRadius:8,padding:"10px 14px",fontSize:13,color:DARK,lineHeight:1.6,marginBottom:14}}>{applyS(cat.intro,sym)}</div>
        {filtered.map((b,i)=><BusinessRow key={i} b={b} budget={budget} catColor={cat.color} catBorder={cat.border} sym={sym} country={country}/>)}
      </div>}
    </div>
  );
}

function StarterApp(){
  const [country,setCountry]=useState(()=>localStorage.getItem("pds-country")||"Nigeria");
  const sym=getSym(country);
  const saveCty=c=>{localStorage.setItem("pds-country",c);setCountry(c)};
  const [capital,setCapital]=useState("");
  const [range,setRange]=useState(null);
  const [search,setSearch]=useState("");
  const budget=parseInt(String(capital).replace(/,/g,""))||0;
  const totalBiz=CATEGORIES_DATA.reduce((a,c)=>a+c.businesses.length,0);
  const visibleBiz=CATEGORIES_DATA.reduce((a,cat)=>{
    return a+cat.businesses.filter(b=>{
      if(search&&!b[0].toLowerCase().includes(search.toLowerCase()))return false;
      if(range){const r=RANGES.find(r=>r.id===range);if(r&&b[3]>r.max)return false;}
      else if(budget>0&&b[3]>budget)return false;
      return true;
    }).length;
  },0);

  return(
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",minHeight:"100vh",background:LGRAY}}>
      <div style={{background:DARK,padding:"13px 22px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.6)",letterSpacing:1.2,textTransform:"uppercase"}}>Prowess Digital Solutions · 2026</div>
          <div style={{fontSize:18,fontWeight:800,color:W,marginTop:2}}>Business Starter, What Should I Start?</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select value={country} onChange={e=>saveCty(e.target.value)}
            style={{background:"rgba(255,255,255,.15)",border:"1.5px solid rgba(255,255,255,.4)",borderRadius:7,padding:"6px 9px",color:W,fontSize:12,fontWeight:600,outline:"none",cursor:"pointer",maxWidth:130}}>
            {COUNTRIES.map(([n])=><option key={n} value={n} style={{color:"#333"}}>{n}</option>)}
          </select>
          <a href="index.html" style={{padding:"6px 14px",background:"rgba(255,255,255,.15)",border:"1.5px solid rgba(255,255,255,.4)",borderRadius:7,color:W,fontSize:12,fontWeight:700,textDecoration:"none"}}>← Back</a>
        </div>
      </div>
      <div style={{background:B,padding:"16px 22px"}}>
        <p style={{color:W,fontSize:13,lineHeight:1.7,marginBottom:14,maxWidth:700}}>Enter your budget and get a full list of businesses you can start in Africa right now, organised by category, with a week-by-week setup checklist for each one you can tick off as you go. {totalBiz} businesses across 12 categories.</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,maxWidth:700}}>
          <div>
            <label style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,.8)",display:"block",marginBottom:6}}>Your Budget</label>
            <input value={capital} onChange={e=>setCapital(e.target.value)} placeholder={`e.g. ${toLocal(200,country)}`}
              style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,.15)",border:"1.5px solid rgba(255,255,255,.4)",borderRadius:9,color:W,fontSize:15,fontWeight:700,outline:"none",boxSizing:"border-box"}}/>
            {budget>0&&<div style={{color:"rgba(255,255,255,.7)",fontSize:12,marginTop:4}}>{toLocal(budget,country)} — businesses within your budget</div>}
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,.8)",display:"block",marginBottom:6}}>Or select a range</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {RANGES.map(r=>(
                <button key={r.id} onClick={()=>setRange(range===r.id?null:r.id)}
                  style={{padding:"5px 11px",background:range===r.id?"rgba(255,255,255,.3)":"rgba(255,255,255,.1)",border:`1.5px solid ${range===r.id?"rgba(255,255,255,.8)":"rgba(255,255,255,.3)"}`,borderRadius:20,color:W,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                  {r.min===0?`Below ${toLocal(r.max,country)}`:r.max===99999999?`Above ${toLocal(r.min,country)}`:`${toLocal(r.min,country)} to ${toLocal(r.max,country)}`}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
      <div style={{background:W,borderBottom:`1px solid ${MGRAY}`,padding:"10px 22px",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:13,fontWeight:700,color:DARK}}>Search:</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Type any business name..."
          style={{padding:"7px 14px",border:`1.5px solid ${MGRAY}`,borderRadius:20,fontSize:13,outline:"none",width:220}}/>
        <span style={{fontSize:12,color:MID,marginLeft:"auto"}}>{visibleBiz} businesses shown</span>
      </div>
      <div style={{padding:"16px 22px",maxWidth:980,margin:"0 auto"}}>
        {CATEGORIES_DATA.map(cat=><CategorySection key={cat.id} cat={cat} budget={budget} search={search} sym={sym} country={country}/>)}
      </div>
      <div style={{textAlign:"center",padding:"14px",fontSize:12,color:"#aaa"}}>© 2026 Prowess Digital Solutions · prowessdigitalsolutions.com</div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<StarterApp/>);
</script>
</body>
</html>
