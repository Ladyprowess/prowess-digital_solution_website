<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Service Guide, Prowess Digital Solutions</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;width:100%;max-width:100%}body{font-family:'DM Sans',sans-serif;background:#f0f4f5;color:#1a2e30;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:'DM Sans',sans-serif;font-size:16px}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}

/* ─── Nav ─── */
.nav{background:#0c1a1b;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.05)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;max-width:1060px;margin:0 auto;gap:8px;width:100%;box-sizing:border-box}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-dot{width:8px;height:8px;border-radius:50%;background:#507c80;box-shadow:0 0 10px rgba(80,124,128,.8);animation:dotPulse 2.5s ease-in-out infinite;flex-shrink:0}
.nav-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.65);letter-spacing:.3px}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-badge{padding:4px 10px;border-radius:99px;background:rgba(46,160,67,.15);border:1px solid rgba(46,160,67,.25);color:#4cba6f;font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase}
.nav-back{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);font-size:12px;font-weight:600;text-decoration:none;transition:all .2s}
.nav-back:hover{background:rgba(255,255,255,.1);color:#fff}

/* ─── Hero ─── */
.hero{background:#0c1a1b;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;pointer-events:none}
.hero-glow-a{position:absolute;width:700px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(80,124,128,.18) 0%,transparent 70%);top:-200px;left:-100px}
.hero-glow-b{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(58,92,96,.12) 0%,transparent 70%);bottom:-150px;right:50px}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(80,124,128,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(80,124,128,.06) 1px,transparent 1px);background-size:48px 48px}
.hero-content{position:relative;z-index:1;padding:32px 24px 36px;max-width:1060px;margin:0 auto;animation:fadeUp .6s cubic-bezier(.22,.68,0,1.2) both}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:4px}
.hero-eyebrow{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(80,124,128,.9);margin-bottom:10px}
.hero-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(22px,4.5vw,38px);font-weight:800;color:#fff;line-height:1.08;letter-spacing:-.4px;margin-bottom:10px}
.hero-title em{font-style:normal;background:linear-gradient(135deg,#7ecdd2,#507c80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:13.5px;color:rgba(255,255,255,.42);line-height:1.65;max-width:580px}
.hero-country{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.18);border-radius:12px;padding:10px 14px;color:#fff;font-size:13px;font-weight:600;outline:none;cursor:pointer;min-width:140px}
.hero-country option{background:#1a2e30;color:#fff}
@media(max-width:600px){.hero-top{flex-direction:column}.hero-content{padding:24px 16px 28px}}

/* ─── Tabs ─── */
.main-tabs{background:#fff;border-bottom:1.5px solid #e2eaeb;animation:fadeIn .3s ease both}
.main-tabs-inner{max-width:1060px;margin:0 auto;display:flex;padding:0 24px}
.main-tab{padding:14px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:700;color:#94a3b8;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:color .15s}
.main-tab.on{color:#507c80;border-bottom-color:#507c80}

/* ─── Content ─── */
.content{padding:24px 24px 48px;max-width:1060px;margin:0 auto}
@media(max-width:600px){.content{padding:16px 16px 40px}}

/* ─── Accordion cards ─── */
.acc-card{background:#fff;border-radius:18px;border:1.5px solid #e2eaeb;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:border-color .2s,box-shadow .25s;animation:fadeUp .5s cubic-bezier(.22,.68,0,1.2) both}
.acc-card.open{border-color:#507c80;box-shadow:0 6px 24px rgba(80,124,128,.13)}
.acc-btn{width:100%;padding:18px 20px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;gap:12px;text-align:left;transition:background .15s}
.acc-card.open .acc-btn{background:#f0f8f8}
.acc-indicator{width:10px;height:10px;border-radius:3px;background:#dde8e9;flex-shrink:0;transition:all .2s}
.acc-card.open .acc-indicator{background:#507c80;box-shadow:0 0 8px rgba(80,124,128,.4)}
.acc-title{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;color:#1a2e30}
.acc-count{background:#f0f8f8;color:#507c80;font-size:11px;font-weight:800;padding:3px 10px;border-radius:99px;border:1px solid rgba(80,124,128,.2)}
.acc-chevron{width:16px;height:16px;flex-shrink:0;transition:transform .2s;color:#94a3b8;margin-left:auto}
.acc-card.open .acc-chevron{transform:rotate(180deg)}
.acc-body{border-top:1.5px solid #edf4f4;padding:20px}
.acc-intro{background:#f8fbfb;border-left:3px solid #507c80;border-radius:0 10px 10px 0;padding:12px 16px;font-size:13px;color:#3a5c60;line-height:1.65;margin-bottom:16px}

/* ─── Script card ─── */
.script-card{background:#fff;border:1.5px solid #e2eaeb;border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.script-card.open{border-color:#507c80}
.script-btn{width:100%;padding:13px 16px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;gap:10px;text-align:left;transition:background .15s}
.script-card.open .script-btn{background:#f8fbfb}
.script-tag{display:inline-block;border-radius:99px;padding:3px 11px;font-size:11px;font-weight:800;color:#fff;white-space:nowrap;flex-shrink:0}
.script-preview{font-size:13px;color:#3a5c60;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.script-body{border-top:1px solid #edf2f3;padding:16px}
.script-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:580px){.script-cols{grid-template-columns:1fr}}
.script-box{border-radius:10px;padding:13px}
.script-box-no{background:#fef2f2}
.script-box-yes{background:#f0f9f0}
.script-box-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.lbl-no{color:#dc2626}
.lbl-yes{color:#16a34a}
.script-quote{font-size:13px;font-style:italic;line-height:1.6}
.script-quote-no{color:#dc2626}
.script-quote-yes{color:#166534}
.script-principle{background:#f8fbfb;border-radius:10px;padding:12px 14px;font-size:13px;color:#3a5c60;line-height:1.6}
.script-principle b{color:#507c80}

/* ─── Complaint grid ─── */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:680px){.cmp-grid{grid-template-columns:1fr}}
.cmp-arrow{color:#507c80;font-size:13px;flex-shrink:0}

/* ─── Rule / tip / practice ─── */
.rule-title{font-weight:800;color:#1a2e30;font-size:14px;margin-bottom:4px}
.rule-body{font-size:13px;color:#4a6b70;line-height:1.6}
.tip-item{background:#f8fbfb;border-radius:10px;padding:13px 14px;margin-bottom:8px;border-left:3px solid #507c80}
.practice-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.practice-num{width:28px;height:28px;background:#507c80;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0}
.dosdonts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:580px){.dosdonts-grid{grid-template-columns:1fr}}
.dos-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.dos-check{color:#16a34a;font-size:14px;flex-shrink:0}
.donts-check{color:#dc2626;font-size:14px;flex-shrink:0}
.dd-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}

/* ─── Footer ─── */
.footer{text-align:center;padding:28px 16px;font-size:12px;color:#94a3b8}

/* ─── Mobile responsive grids ─── */
.grid-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-complaints{display:grid;grid-template-columns:1fr 1.4fr;gap:20px;align-items:start}
.grid-script-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:640px){
  .grid-2col,.grid-complaints,.grid-script-cols{grid-template-columns:1fr!important}
}
</style>

</head>

const {useState,useEffect}=React;
const COUNTRIES=[["Algeria","DA"],["Angola","Kz"],["Benin","CFA"],["Botswana","P"],["Burkina Faso","CFA"],["Burundi","Fr"],["Cabo Verde","Esc"],["Cameroon","CFA"],["Central African Republic","CFA"],["Chad","CFA"],["Comoros","Fr"],["Congo DR","FC"],["Congo Republic","CFA"],["Côte d'Ivoire","CFA"],["Djibouti","Fr"],["Egypt","E£"],["Equatorial Guinea","CFA"],["Eritrea","Nfk"],["Eswatini","L"],["Ethiopia","Br"],["Gabon","CFA"],["Gambia","D"],["Ghana","GH₵"],["Guinea","Fr"],["Guinea-Bissau","CFA"],["Kenya","KSh"],["Lesotho","L"],["Liberia","L$"],["Libya","LD"],["Madagascar","Ar"],["Malawi","MK"],["Mali","CFA"],["Mauritania","UM"],["Mauritius","₨"],["Morocco","MAD"],["Mozambique","MT"],["Namibia","N$"],["Niger","CFA"],["Nigeria","₦"],["Rwanda","Fr"],["São Tomé and Príncipe","Db"],["Senegal","CFA"],["Seychelles","₨"],["Sierra Leone","Le"],["Somalia","Sh"],["South Africa","R"],["South Sudan","£"],["Sudan","£"],["Tanzania","TSh"],["Togo","CFA"],["Tunisia","DT"],["Uganda","USh"],["Zambia","ZK"],["Zimbabwe","Z$"]];

const applyS=(txt,s)=>typeof txt==="string"?txt.replace(/₦/g,s):txt;

const B="#507c80",DARK="#3a5c60",MID="#6a9ea3",LITE="#e8f4f5",LGRAY="#f2f5f5",MGRAY="#c8d8da",W="#fff";

// ── CORE SECTIONS ─────────────────────────────────────────────────────────
const CORE_SECTIONS=[
  {
    id:"mindset",icon:"🧠",title:"The Right Mindset",color:LITE,border:B,
    items:[
      {type:"intro",text:"Your customer's experience decides whether they come back, and whether they tell others about you. In Africa, word of mouth travels faster than any advert. One person treated badly can cost you ten customers. One person treated well can bring you twenty."},
      {type:"rule",title:"The customer is not always right, but they always deserve respect",body:"You do not have to agree with every complaint. But every complaint deserves a calm, respectful response. Even if they are rude, your professionalism is what separates your business from the competition."},
      {type:"rule",title:"Your reaction is your brand",body:"If you insult a customer on WhatsApp, that screenshot will exist forever. If you calm them down and solve their problem, that story will be told for free. Treat every interaction like the whole market is watching."},
      {type:"rule",title:"Speed matters more than perfection",body:"A quick 'I have seen your message and I am looking into it' beats a perfect response that comes two days later. People want to feel heard first. Solutions come second."},
      {type:"rule",title:"Repeat customers are your real income",body:"Getting a new customer costs money. Keeping an existing customer costs almost nothing. Your customer service is your most affordable marketing strategy."},
    ]
  },
  {
    id:"scripts",icon:"💬",title:"Core Scripts, What to Say",color:"#f0f8f0",border:"#27ae60",
    items:[
      {type:"intro",text:"These are ready-to-use messages. Copy them, edit your business name, and send. They are written in a tone that is professional but natural."},
      {type:"script",tag:"Angry customer",tagColor:"#c0392b",scenario:"Someone messages you shouting about a problem, delivery late, product not as described, service not done well.",wrong:"That is not my fault. I told you the product is like that. Please stop disturbing me.",right:"I am really sorry you are experiencing this. I understand how frustrating this is and I take it seriously. Please give me [timeframe] to look into this and get back to you with a proper resolution. I will not let this go unresolved.",tip:"Never argue. Acknowledge the feeling first, then address the issue."},
      {type:"script",tag:"Customer is wrong about facts",tagColor:"#e65100",scenario:"A customer claims something that is not accurate, wrong price, wrong order, wrong expectation.",wrong:"That is not what I said. Look at what I posted. You did not read properly.",right:"I completely understand the confusion. Let me clarify what was agreed: [explain clearly]. I want to make sure we are both on the same page so we can sort this out quickly. Can I share the details of your order with you?",tip:"Correct without accusing. Use 'I want to clarify' not 'you are wrong'."},
      {type:"script",tag:"Customer requests a refund",tagColor:"#7b1fa2",scenario:"Customer wants their money back.",wrong:"We do not do refunds. It is stated clearly on our page. Nothing I can do.",right:"Thank you for reaching out about this. I want to understand what went wrong first so I can offer you the best resolution. Can you tell me more about the issue? Depending on what happened, I can offer you [option A] or [option B]. My priority is making sure you are satisfied.",tip:"Even if your policy is no refunds, always listen first and offer an alternative. A replacement, a discount, or a store credit goes a long way."},
      {type:"script",tag:"Customer says your price is too high",tagColor:B,scenario:"Someone says they can get it cheaper elsewhere.",wrong:"Then go and buy from them. My price is my price.",right:"I appreciate your honesty. My price reflects [quality of materials, time, skill involved]. I do not compromise on that because I want you to get real value. However, if budget is a concern, let me see what I can do, maybe a smaller quantity to start, or a payment plan.",tip:"Never apologise for your price. Explain what they are paying for. If they still leave, they were not your customer."},
      {type:"script",tag:"Happy customer, how to seal loyalty",tagColor:"#27ae60",scenario:"Customer got their product or service and loved it.",wrong:"Okay, thank you. (nothing else)",right:"Thank you so much, this truly means a lot to me! It was a pleasure serving you. If you know anyone who might need [your service], I would really appreciate a referral. And if you ever need anything again, I am always here.",tip:"Happy customers forget to refer. Remind them. One line is all it takes."},
      {type:"script",tag:"Following up after a purchase",tagColor:MID,scenario:"2 to 3 days after a customer receives their order.",wrong:"(no message at all)",right:"Hi [Name]! This is [Your Name] from [Business Name]. I just wanted to check in and make sure you are happy with [product or service]. Please let me know if there is anything you need.",tip:"Most businesses never follow up. This one message alone will make you stand out."},
      {type:"script",tag:"Customer went quiet after asking price",tagColor:"#888",scenario:"They asked for price, you replied, they went quiet.",wrong:"Hello? Hello? Are you still interested? (multiple messages)",right:"Hi [Name], just checking in to see if you had any questions about the pricing I shared. No pressure at all, I am here whenever you are ready.",tip:"One gentle follow-up only. After that, leave them. Chasing people makes you look desperate."},
    ]
  },
  {
    id:"channels",icon:"📱",title:"WhatsApp, DMs and Phone Calls",color:"#fef9e7",border:"#f0c040",
    items:[
      {type:"intro",text:"In Africa, most of your customer communication will happen on WhatsApp. How you manage it directly affects how professional your business looks."},
      {type:"tip",title:"Set a business tone on WhatsApp from day one",body:"Use a clear business name and profile photo. Set a greeting message for new contacts. Keep your status updated with current offerings. Never use personal WhatsApp for business if you can avoid it, get WhatsApp Business."},
      {type:"tip",title:"Response time is a silent promise",body:"If you reply within an hour, customers expect that always. Set a realistic standard and stick to it. If you are unavailable, set an auto-reply: 'Thank you for reaching out. I will respond within [X hours]. Your message is important to me.'"},
      {type:"tip",title:"Voice notes, use them carefully",body:"Many Nigerians prefer voice notes. They are fine for friendly conversations. But for complaints, pricing, or any disagreement, stick to typed messages. Typed messages are clear, professional, and cannot be misquoted."},
      {type:"tip",title:"Phone calls, always answer professionally",body:"Never pick up a business call with 'hello?' Pick up with: 'Good [morning or afternoon], this is [name] from [business name], how can I help you?' It takes two seconds and instantly elevates your brand."},
      {type:"tip",title:"When a call gets heated",body:"Lower your voice. Do not match their energy. Say: 'I can hear that you are upset and I completely understand. Can I call you back in 10 minutes once I have pulled up your details? I want to give this the full attention it deserves.'"},
    ]
  },
  {
    id:"loyalty",icon:"🔁",title:"Building Loyal Customers",color:"#f3e5f5",border:"#7b1fa2",
    items:[
      {type:"intro",text:"The goal is not just to make a sale. The goal is to make a customer. A loyal customer buys again, refers others, and defends your business when others talk badly about it."},
      {type:"practice",title:"Remember names and preferences",body:"When a customer comes back, use their name. Say 'Last time you ordered the [X], would you like the same?' This takes almost no effort and creates a feeling of being valued."},
      {type:"practice",title:"Celebrate with them",body:"Birthday? Send a simple message and a small discount. Just delivered a baby? Congratulate them. People buy from people they feel connected to. In Africa where personal connection matters deeply, this is powerful."},
      {type:"practice",title:"Create a simple loyalty structure",body:"'Buy 5, get 1 free.' 'Refer a friend and get 10% off your next order.' You do not need an app. A WhatsApp note or a manual tally works just as well when you are starting."},
      {type:"practice",title:"Ask for feedback and actually use it",body:"'I want to keep improving, what could I have done better?' This question makes customers feel like partners. The ones who give feedback are giving you free consulting."},
      {type:"practice",title:"Do small unexpected things",body:"An extra item in the bag. A handwritten note that says 'Thank you, I appreciate you.' Free packaging upgrade. These cost almost nothing and produce outsized loyalty. Nobody expects them. That is exactly why they work."},
    ]
  },
  {
    id:"dos",icon:"✅",title:"Quick Reference, Do and Do Not",color:LITE,border:B,
    items:[
      {type:"dosdonts",dos:["Always respond within a reasonable time","Acknowledge the customer's feeling before solving the problem","Use the customer's name when you know it","Keep a record of complaints and how you resolved them","Apologise when you are wrong, clearly and directly","Follow up after every order","Ask for reviews from happy customers","Maintain the same respectful tone whether they are buying a small amount or a large amount","Underpromise and overdeliver","Treat every interaction like the whole market is watching"],
       donts:["Do not argue, you will win the argument and lose the customer","Do not use capital letters when responding to complaints (it reads as shouting)","Do not post about difficult customers publicly, ever","Do not make promises you cannot keep just to calm someone down","Do not ignore complaints hoping they go away","Do not be sarcastic, even if the customer is being unreasonable","Do not give different prices to different customers without reason","Do not keep customers waiting without acknowledgement","Do not apologise without also offering a solution","Do not let emotions run your responses, the keyboard is not your friend when you are angry"]}
    ]
  }

// ── COMPLAINT CATEGORIES (large list) ────────────────────────────────────
const COMPLAINT_CATS=[
  {
    id:"time",icon:"⏰",title:"Time, Delays and Availability",color:"#fff3e0",border:"#e65100",tagColor:"#e65100",
    intro:"Customers get most frustrated when you waste their time or disappear without explanation. This is one of the most common reasons people stop buying from a business.",
    complaints:["Service took much longer than promised","Long wait times without explanation or apology","Delivery delayed or never happened","Business closed early or unexpectedly unavailable","Vendor late to appointments or to their own business","Inconsistent opening hours announced","Vendor cancels last minute often","Vendor ghosts after partial payment","Vendor overbooks and disappoints","Service dragged out unnecessarily","No plan for common disruptions like rain or traffic","Delivery excuses always, traffic, fuel, etc.","No updates or tracking for orders","Vendor overwhelmed and shows it","Business lacks structure or organisation","Business relocated without informing customers","Vendor disappeared mid-process","Lacks basic tools or equipment needed on the day","Vendor closes unexpectedly during peak times","Business owners not helping customers understand delivery problems"],
    scripts:[
      {tag:"Delayed service or delivery",right:"I sincerely apologise for this delay. I know your time is valuable and this was not the experience I want to give you. Here is exactly what happened: [brief honest explanation]. Your [order or service] will be ready by [new specific time]. If this does not work for you, please let me know and we will work out a solution together.",principle:"Give a specific new time. Not 'soon'. Not 'shortly'. A date and time. Then honour it."},
      {tag:"Business unexpectedly unavailable",right:"I am so sorry I was not available at the time you came or reached out. This was not professional of me and I completely understand your frustration. [Brief honest reason without making it an excuse]. I would like to make it up to you, can we reschedule at a time that works for you? I will also make sure this does not happen again.",principle:"Own the absence. Do not over-explain. Offer a concrete next step immediately."},
      {tag:"Delivery that never arrived",right:"I am really sorry about this, I completely understand how unacceptable this is, especially after you have paid. I am looking into what happened right now. I will give you a full update within [X hours] with a clear resolution. You will either receive your order or a full refund. I will not let this go unresolved.",principle:"Do not ask the customer to wait with no action. Commit to a real resolution with a deadline."},
    ]
  },
  {
    id:"comms",icon:"📵",title:"Communication and Responsiveness",color:"#e3f2fd",border:"#1565c0",tagColor:"#1565c0",
    intro:"Silence after payment is one of the fastest ways to lose a customer's trust forever. Poor communication makes customers feel ignored, disrespected and anxious about their money.",
    complaints:["No response to messages or calls after payment","Poor social media replies or ignoring DMs","Blocks negative feedback online","Vendor threatens or blocks complainers online","Communication barrier or poor explanation","Vendor interrupts customer often","Vendor talks too much, listens little","Vendor ignores repeated requests","Vendor pushes unrelated sales during conversation","Inconsistent pricing day-to-day","No clear pricing list displayed","No system for bookings or appointments","Vendor uses slang rudely","Poor response to feedback","No transparency in process or costs","No proper records, disputes over payments and orders","Vendor does not update on progress","No clear terms for services","Vendor favors certain customers over others","Responds to positive comments but ignores complaints publicly"],
    scripts:[
      {tag:"Not responding after payment",right:"I am so sorry for going quiet on you, this was wrong of me and I completely understand why you are frustrated. I have your order and I am updating you now: [status of their order]. You will hear from me with a full update by [specific time]. Going forward I will always keep you informed.",principle:"No excuse is good enough for silence after payment. Address it directly, update them immediately, give a specific time for the next update."},

    intro:"When the customer receives something different from what was shown or described, trust breaks immediately. Your photos, descriptions and promises must match reality exactly.",
    complaints:["Quality much lower than what was shown or described","Wrong item or service provided despite clear instructions","Substandard tools or materials used visibly","Fake or misleading photos and descriptions used","Overhyped online but reality disappoints","Obvious lack of training or skill gaps","Uses low-quality substitutes without notice","Copies competitors poorly without originality","Service inconsistent across visits","Poor finishing or attention to detail","Product expired or near expiry when sold","Short measure or quantity less than paid for","Service quality dropped after building trust","Vendor not knowledgeable about own product","Posts fake testimonials or fake before and afters","Packaging fails causing mess or damage","Sends wrong variant or version","Causes more issues while fixing one","Vendor rushed service to fit own schedule","Service felt impersonal with no care","Item or service damaged or faulty on delivery","Service inconsistent, great first time, poor after"],

  {
    id:"pricing",icon:"💸",title:"Pricing, Payments and Transparency",color:"#f3e5f5",border:"#7b1fa2",tagColor:"#7b1fa2",
    intro:"Anything that feels like hidden money or surprise charges creates immediate distrust. Be transparent upfront. Customers do not mind paying, they mind being surprised.",
    complaints:["Extra charges added without prior notice","Hidden fees or extras not mentioned upfront","Pricing changed suddenly from agreed amount","No receipt or proof of transaction given","Charges extra for small additions","Charges network fees unfairly","Hidden conditions on offers and promos","Vendor demands full payment before starting with no guarantee","No refund policy communicated clearly","No partial refund even for major mistakes","Overprices consistently for poor effort","Vendor pushes for tips aggressively","Vendor favors cash over transfers","Borrows change from customer informally","Poor handling of money or change","Vendor haggles aggressively","Service feels exploitative","Pricing inconsistent day to day","Overpromises discounts that disappear","Vendor exploits urgency to charge more"],
    scripts:[
      {tag:"Unexpected charges added",right:"I understand your concern and I completely see why this feels unfair. I should have been clearer about [the specific charge] upfront before we started. That was a communication failure on my part. What I am willing to do is [waive it this time, explain and justify it clearly, or adjust the final amount]. Going forward I will always discuss every cost before proceeding.",principle:"Extra charges without prior agreement will feel like a scam to the customer even if they are legitimate. Always communicate costs upfront. Always."},

      {tag:"No receipt was given",right:"You are absolutely right to ask for one. I will send you a receipt now. [Send payment confirmation or typed breakdown immediately.] Going forward I will always provide proof of payment with every transaction.",principle:"A receipt is basic. It protects both you and the customer. No receipt makes every future dispute harder to resolve."},

  {
    id:"attitude",icon:"😤",title:"Attitude, Behaviour and Professionalism",color:"#fff8e1",border:"#f0c040",tagColor:"#e65100",
    intro:"Customers can forgive a mistake. They rarely forgive being disrespected. Your attitude is the single most powerful factor in whether a customer returns or tells people to avoid you.",
    complaints:["Rude or dismissive attitude when complained to","Vendor on phone the whole time, ignoring customer","Vendor argues during bargaining or complaints","Vendor blames customer for vendor's own mistakes","Vendor complains about economy or hardship to customers","Judgmental attitude toward customer choices","Vendor compares customer unfavorably to others","Vendor gossips about other customers","Vendor emotional or dramatic in responses","Vendor loses temper easily","Poor eye contact or engagement","Vendor seems uninterested or bored","No greeting or farewell routine","Vendor uses slang rudely or condescendingly","Lack of basic professionalism, no greeting, no courtesy","Vendor's family member or helper rude to customers","Vendor smokes or eats near workspace","Poor body language, sighs, eye rolls, visible impatience","Vendor interrupts customer constantly","Vendor defensive instead of helpful","Vendor reacts harshly to any critique","Vendor escalates minor issues unnecessarily","No calm handling of situations","No energy or enthusiasm shown","Vendor seems burnt out and visibly frustrated","Vendor talks too much and listens very little"],
    scripts:[

      {tag:"Customer witnesses your helper or family being rude",right:"I am so sorry you experienced that. That behaviour does not represent my business or my standards. I will address it directly. Please know that as far as I am concerned, you deserve to be treated with full respect every single time you interact with my business.",principle:"Never defend a rude helper or family member to a customer. Their conduct is your responsibility."},
      {tag:"Customer feels judged or looked down on",right:"I am truly sorry if I made you feel that way, that was never my intention and it was wrong regardless of intent. Every customer deserves to be treated with equal respect and care, no matter what they are buying or how much they are spending. I will do better.",principle:"Classism and judgment are real and customers feel it. If a customer says they felt looked down on, that is information. Take it seriously."},

  {
    id:"resolution",icon:"🔧",title:"Refunds, Fixes and Accountability",color:"#e8f5e9",border:"#27ae60",tagColor:"#2e7d32",
    intro:"The way you handle a problem tells a customer everything about who you are. A business that fixes mistakes well often builds stronger loyalty than one that never makes mistakes at all.",
    complaints:["No refund or fix offered for errors","Vendor blamed customer for vendor's own mistakes","No apology for errors or issues, ever","Vendor defensive instead of accepting responsibility","Turns complaints into arguments","No ownership of problems","Vendor shifts blame constantly","No genuine apology for errors","No improvement despite repeated complaints","Vendor ignores patterns in feedback","No learning from mistakes","Vendor repeats same errors","Poor accountability overall","No warranty or guarantee honoured","Causes more problems while fixing one","Vendor offers 'next time' promises endlessly","No follow-through on resolutions","Vendor asks for reviews before completing the job","No partial refund for major issues","Vendor threatened customer for leaving review"],

  {
    id:"hygiene",icon:"🧹",title:"Hygiene, Environment and Safety",color:"#f1f8e9",border:"#558b2f",tagColor:"#558b2f",
    intro:"Your workspace is a physical representation of your standards. Customers make immediate judgements about quality based on cleanliness, smell and comfort. These are easy fixes that have huge impact.",
    complaints:["Poor hygiene or unclean environment","Smells bad or poor ventilation in space","Overcrowded or uncomfortable waiting area","Service environment uncomfortable or too hot","Vendor smokes or eats near workspace","No safety or hygiene protocols followed","Substandard tools or materials used visibly","Product expired or near expiry when sold","Poor packaging leading to damage or spillage","No cleanliness standards maintained","Poor lighting making inspection difficult","Uses personal phone to record receipts poorly","No separation between personal and business space","Service disrupted by family, kids, or visitors","No boundaries maintained in workspace","Vendor mixes personal and business constantly","Vendor eats or drinks while attending to customer"],

  {

    complaints:["Posts fake testimonials or before and after photos","Uses misleading photos or overhyped descriptions","Vendor lies about small things, leading to doubt about everything","Vendor cuts corners visibly","No integrity in promises","Service erodes trust over time","Vendor takes advantage of trust built over time","Vendor exploits urgency to extract money","Poor ethics in dealings, customer feels used","Vendor prioritises short-term profit over people","Vendor copies competitors poorly without originality","Hidden conditions on offers and promotions","Vendor asks for reviews before completing work","Vendor sees complaints as personal attacks","Vendor uses customer stories to gossip or entertain others","No discretion with customer information","Vendor shares private customer details with others","Vendor badmouths competitors to seem superior","Uses low-quality substitutes without telling the customer","No transparency about what is in a product or service"],

    intro:"Delivery failure is one of the most financially and reputationally damaging things that can happen to a product business. Every promise about delivery is a binding commitment in the customer's mind.",
    complaints:["Delivery delayed or never happened","Wrong item delivered despite clear instructions","Packaging fails causing mess or damage","No updates or tracking for orders","Vendor blames external factors for every delay","Delivery excuses always: traffic, fuel, weather, etc.","No plan for common disruptions","Vendor ghosts after partial payment","Sends wrong variant or version","Items arrive damaged","Business relocated without informing delivery customers","No transparency in delivery process or costs","Vendor disappears mid-process","No alternative offered when delivery fails","No courier backup when personal delivery not possible","Customer paid delivery fee and still received late"],

      {tag:"Delivery failed or went wrong",right:"I am so sorry this did not arrive as expected. I take full responsibility for this. Here is exactly what happened: [honest explanation]. Here is what I am doing right now to fix it: [specific action and timeline]. You will not need to pay anything extra and I will personally make sure this is corrected. Thank you for your patience.",principle:"Give three things: what happened, what you are doing about it, and when it will be resolved. Never give one without the others."},

// ─── ScriptCard ───────────────────────────────────────────────────────────
function ScriptCard({s,sym="₦"}){
  const [open,setOpen]=useState(false);
  return(
    <div style={{background:"#fff",borderRadius:12,border:"1.5px solid",borderColor:open?"#507c80":"#e2eaeb",marginBottom:8,overflow:"hidden",transition:"border-color .2s",boxShadow:open?"0 4px 16px rgba(80,124,128,.1)":"0 1px 4px rgba(0,0,0,.03)"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",padding:"13px 16px",background:open?"#f0f8f8":"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:10,textAlign:"left",transition:"background .15s"}}>
        <span style={{display:"inline-block",background:s.tagColor||"#507c80",color:"#fff",fontSize:11,fontWeight:800,padding:"3px 11px",borderRadius:99,whiteSpace:"nowrap",flexShrink:0}}>{s.tag}</span>
        {!open&&<span style={{fontSize:13,color:"#6b8f93",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{(s.scenario||s.tag).slice(0,60)}...</span>}
        <svg width="14" height="14" style={{color:"#94a3b8",transform:open?"rotate(180deg)":"rotate(0)",transition:"transform .2s",flexShrink:0,marginLeft:"auto"}} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/></svg>
      </button>
      {open&&<div style={{padding:"16px 18px",borderTop:"1px solid #f0f4f5"}}>
        {s.scenario&&<div style={{fontSize:13,color:"#4a6b70",marginBottom:14,lineHeight:1.6,background:"#f8fbfb",padding:"10px 14px",borderRadius:10}}>{s.scenario}</div>}
        {s.wrong?(
          <div className="grid-script-cols">
            <div style={{background:"#fef2f2",borderRadius:10,padding:"13px 14px"}}>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:"#dc2626",marginBottom:6}}>Do not say this</div>
              <div style={{fontSize:13,fontStyle:"italic",color:"#dc2626",lineHeight:1.6}}>"{applyS(s.wrong||"",sym)}"</div>
            </div>
            <div style={{background:"#f0faf0",borderRadius:10,padding:"13px 14px"}}>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:"#16a34a",marginBottom:6}}>Say this instead</div>
              <div style={{fontSize:13,fontStyle:"italic",color:"#166534",lineHeight:1.6}}>"{applyS(s.right||"",sym)}"</div>
            </div>
          </div>
        ):(
          <div style={{background:"#f0faf0",borderRadius:10,padding:"13px 14px",marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:"#16a34a",marginBottom:6}}>What to say</div>
            <div style={{fontSize:13,fontStyle:"italic",color:"#166534",lineHeight:1.6}}>"{applyS(s.right||"",sym)}"</div>
          </div>
        )}
        <div style={{background:"#f0f8f8",borderRadius:10,padding:"11px 14px",fontSize:13,color:"#3a5c60",lineHeight:1.6}}>
          <b style={{color:"#507c80"}}>Key principle: </b>{applyS(s.tip||s.principle||"",sym)}
        </div>
      </div>}
    </div>
  );
}

// ─── CoreSectionContent ───────────────────────────────────────────────────
function CoreSectionContent({sec,sym="₦"}){
  return(
    <div style={{animation:"fadeUp .4s cubic-bezier(.22,.68,0,1.2) both"}}>
      {/* Intro banner */}
      <div style={{background:"linear-gradient(135deg,#0c1a1b,#1a3a3e)",borderRadius:16,padding:"16px",marginBottom:20,position:"relative",overflow:"hidden",width:"100%",boxSizing:"border-box"}}>
        <div style={{position:"absolute",inset:0,backgroundImage:"linear-gradient(rgba(80,124,128,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(80,124,128,.08) 1px,transparent 1px)",backgroundSize:"32px 32px",pointerEvents:"none"}}/>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:"clamp(18px,3vw,24px)",fontWeight:800,color:"#fff",marginBottom:8}}>{sec.title}</div>
        </div>
      </div>
      {/* Items */}
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {sec.items.map((item,i)=>{
          if(item.type==="intro")return(
            <div key={i} style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e2eaeb",borderLeft:"3px solid #507c80",fontSize:14,color:"#3a5c60",lineHeight:1.7}}>{applyS(item.text||"",sym)}</div>
          );
          if(item.type==="rule")return(
            <div key={i} style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e2eaeb",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
              <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,color:"#1a2e30",fontSize:15,marginBottom:6}}>{item.title}</div>
              <div style={{fontSize:13,color:"#4a6b70",lineHeight:1.65}}>{applyS(item.body||"",sym)}</div>
            </div>
          );
          if(item.type==="script")return<ScriptCard key={i} s={item} sym={sym}/>;
          if(item.type==="tip")return(
            <div key={i} style={{background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid #e2eaeb",borderLeft:"3px solid #507c80"}}>
              <div style={{fontWeight:800,color:"#1a2e30",fontSize:14,marginBottom:4}}>{item.title}</div>
              <div style={{fontSize:13,color:"#4a6b70",lineHeight:1.6}}>{applyS(item.body||"",sym)}</div>
            </div>
          );
          if(item.type==="practice")return(
            <div key={i} style={{background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid #e2eaeb",display:"flex",gap:14,alignItems:"flex-start"}}>
              <div style={{width:32,height:32,borderRadius:10,background:"#507c80",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,flexShrink:0}}>{i}</div>
              <div>
                <div style={{fontWeight:800,color:"#1a2e30",fontSize:14,marginBottom:4}}>{item.title}</div>
                <div style={{fontSize:13,color:"#4a6b70",lineHeight:1.6}}>{applyS(item.body||"",sym)}</div>
              </div>
            </div>
          );
          if(item.type==="dosdonts")return(
            <div key={i} className="grid-2col">
              <div style={{background:"#fff",borderRadius:14,padding:"18px",border:"1px solid #e2eaeb"}}>
                <div style={{fontSize:11,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:"#16a34a",marginBottom:12}}>Do these</div>
                {item.dos.map((d,j)=><div key={j} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:8}}>
                  <span style={{color:"#16a34a",fontSize:15,flexShrink:0,lineHeight:1}}>✓</span>
                  <span style={{fontSize:13,color:"#1a2e30",lineHeight:1.4}}>{applyS(d,sym)}</span>
                </div>)}
              </div>
              <div style={{background:"#fff",borderRadius:14,padding:"18px",border:"1px solid #e2eaeb"}}>
                <div style={{fontSize:11,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:"#dc2626",marginBottom:12}}>Avoid these</div>
                {item.donts.map((d,j)=><div key={j} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:8}}>
                  <span style={{color:"#dc2626",fontSize:15,flexShrink:0,lineHeight:1}}>✗</span>
                  <span style={{fontSize:13,color:"#1a2e30",lineHeight:1.4}}>{applyS(d,sym)}</span>
                </div>)}
              </div>
            </div>
          );
          return null;
        })}
      </div>
    </div>
  );
}

// ─── ComplaintView ────────────────────────────────────────────────────────
function ComplaintView({cat,sym="₦"}){
  const [search,setSearch]=useState("");
  const filtered=search?cat.complaints.filter(c=>c.toLowerCase().includes(search.toLowerCase())):cat.complaints;
  return(
    <div style={{animation:"fadeUp .4s cubic-bezier(.22,.68,0,1.2) both"}}>
      {/* Category banner */}
      <div style={{background:"linear-gradient(135deg,#0c1a1b,#1a3a3e)",borderRadius:16,padding:"16px",marginBottom:20,position:"relative",overflow:"hidden",width:"100%",boxSizing:"border-box"}}>
        <div style={{position:"absolute",inset:0,backgroundImage:"linear-gradient(rgba(80,124,128,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(80,124,128,.08) 1px,transparent 1px)",backgroundSize:"32px 32px",pointerEvents:"none"}}/>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:"clamp(16px,3vw,22px)",fontWeight:800,color:"#fff",marginBottom:6}}>{cat.title}</div>
          <p style={{fontSize:13,color:"rgba(255,255,255,.5)",lineHeight:1.65,maxWidth:600}}>{cat.intro}</p>
        </div>
      </div>

      {/* Two-column layout: complaints list + scripts */}
      <div className="grid-complaints">
        {/* Complaints list */}
        <div style={{background:"#fff",borderRadius:16,border:"1px solid #e2eaeb",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
          <div style={{padding:"16px 18px",borderBottom:"1px solid #f0f4f5",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
            <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:14,fontWeight:800,color:"#1a2e30"}}>Complaint types <span style={{fontSize:12,color:"#507c80",fontFamily:"'DM Sans',sans-serif",fontWeight:700}}>({filtered.length})</span></div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
              style={{padding:"6px 12px",border:"1.5px solid #e2eaeb",borderRadius:99,fontSize:12,outline:"none",width:140}}/>
          </div>
          <div style={{maxHeight:480,overflowY:"auto"}}>
            {filtered.map((complaint,i)=>(
              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 16px",borderBottom:"1px solid #f8fafb",transition:"background .1s"}}
                onMouseEnter={e=>e.currentTarget.style.background="#f8fbfb"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{color:"#507c80",fontSize:13,flexShrink:0,marginTop:1}}>›</span>
                <span style={{fontSize:13,color:"#1a2e30",lineHeight:1.45}}>{complaint}</span>
              </div>
            ))}
            {filtered.length===0&&<div style={{padding:"20px 16px",fontSize:13,color:"#94a3b8",textAlign:"center"}}>No matching complaints</div>}
          </div>
        </div>

        {/* Response scripts */}
        <div>
          <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:14,fontWeight:800,color:"#1a2e30",marginBottom:12}}>Response scripts</div>
          {cat.scripts.map((s,i)=><ScriptCard key={i} s={{...s,tagColor:cat.tagColor}} sym={sym}/>)}
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<CSApp/>);
</script>
</body>
</html>
