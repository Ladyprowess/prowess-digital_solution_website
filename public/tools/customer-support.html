<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Service Guide</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;width:100%;max-width:100%}
body{font-family:'DM Sans',sans-serif;background:#f0f4f5;color:#1a2e30;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.nav{background:#0c1a1b;position:sticky;top:0;z-index:100;width:100%}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;max-width:1060px;margin:0 auto;gap:8px;width:100%}
.nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;min-width:0}
.nav-dot{width:8px;height:8px;border-radius:50%;background:#507c80;box-shadow:0 0 8px rgba(80,124,128,.8);animation:dotPulse 2.5s ease-in-out infinite;flex-shrink:0}
.nav-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-badge{padding:4px 10px;border-radius:99px;background:rgba(46,160,67,.15);border:1px solid rgba(46,160,67,.25);color:#4cba6f;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.nav-back{padding:6px 12px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap}
.tab-bar{background:#fff;border-bottom:1.5px solid #e2eaeb;width:100%}
.tab-bar-inner{max-width:1060px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;padding:0 4px;width:100%}
.tab-bar-inner::-webkit-scrollbar{display:none}
.tab-btn{padding:13px 14px;border:none;background:transparent;cursor:pointer;white-space:nowrap;font-size:13px;font-weight:700;color:#94a3b8;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:color .15s;flex-shrink:0;display:flex;align-items:center;gap:5px}
.tab-btn.on{color:#507c80;border-bottom-color:#507c80}
.tab-count{background:#f0f8f8;color:#507c80;font-size:10px;font-weight:800;padding:1px 7px;border-radius:99px;border:1px solid rgba(80,124,128,.2)}
.main-tab-btn{padding:14px 20px;border:none;background:transparent;cursor:pointer;white-space:nowrap;font-size:14px;font-weight:700;color:#94a3b8;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:color .15s;flex-shrink:0}
.main-tab-btn.on{color:#507c80;border-bottom-color:#507c80}
.page-content{max-width:1060px;margin:0 auto;padding:20px 16px 48px;width:100%}
.hero{background:#0c1a1b;position:relative;overflow:hidden;width:100%}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(80,124,128,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(80,124,128,.07) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.hero-glow{position:absolute;width:500px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(80,124,128,.2) 0%,transparent 70%);top:-150px;left:-80px;pointer-events:none}
.hero-inner{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:28px 16px 32px;width:100%}
.hero-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px}
.hero-eyebrow{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(80,124,128,.9);margin-bottom:10px}
.hero-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(22px,5vw,38px);font-weight:800;color:#fff;line-height:1.06;letter-spacing:-.4px;margin-bottom:10px}
.hero-title span{background:linear-gradient(135deg,#7ecdd2,#507c80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:13px;color:rgba(255,255,255,.42);line-height:1.65;max-width:560px}
.hero-select{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.18);border-radius:12px;padding:10px 14px;color:#fff;font-size:13px;font-weight:600;outline:none;cursor:pointer;min-width:130px;flex-shrink:0}
.hero-select option{background:#1a2e30}
.dark-banner{background:linear-gradient(135deg,#0c1a1b,#1a3a3e);border-radius:16px;padding:18px;margin-bottom:20px;position:relative;overflow:hidden;width:100%}
.dark-banner-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(80,124,128,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(80,124,128,.08) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.dark-banner-inner{position:relative;z-index:1}
.dark-banner-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(16px,3vw,22px);font-weight:800;color:#fff;margin-bottom:6px}
.dark-banner-desc{font-size:13px;color:rgba(255,255,255,.5);line-height:1.65}
.card{background:#fff;border-radius:14px;border:1px solid #e2eaeb;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-teal-left{border-left:3px solid #507c80}
.sc{background:#fff;border-radius:12px;border:1.5px solid #e2eaeb;margin-bottom:8px;transition:border-color .2s}
.sc.open{border-color:#507c80;box-shadow:0 4px 16px rgba(80,124,128,.1)}
.sc-btn{width:100%;padding:12px 14px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;gap:10px;text-align:left;transition:background .15s;border-radius:12px}
.sc.open .sc-btn{background:#f0f8f8;border-radius:12px 12px 0 0}
.sc-tag{display:inline-block;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:800;color:#fff;white-space:nowrap;flex-shrink:0}
.sc-preview{font-size:13px;color:#6b8f93;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.sc-body{border-top:1px solid #f0f4f5;padding:14px 16px}
.sc-scenario{font-size:13px;color:#4a6b70;line-height:1.6;background:#f8fbfb;padding:10px 14px;border-radius:10px;margin-bottom:12px}
.sc-scripts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:540px){.sc-scripts{grid-template-columns:1fr}}
.sc-no{background:#fef2f2;border-radius:10px;padding:12px}
.sc-yes{background:#f0faf0;border-radius:10px;padding:12px}
.sc-lbl{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.sc-quote{font-size:13px;font-style:italic;line-height:1.6;word-wrap:break-word}
.sc-principle{background:#f0f8f8;border-radius:10px;padding:11px 13px;font-size:13px;color:#3a5c60;line-height:1.6;word-wrap:break-word}
.dd-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:540px){.dd-grid{grid-template-columns:1fr}}
.cmp-layout{display:grid;grid-template-columns:1fr 1.3fr;gap:16px;align-items:start;width:100%;min-width:0}
.cmp-layout > *{min-width:0;width:100%}
@media(max-width:680px){.cmp-layout{grid-template-columns:1fr}}

/* Complaint list; NO overflow:hidden on the box itself */
.cmp-list-box{background:#fff;border-radius:14px;border:1px solid #e2eaeb;min-width:0;width:100%}
.cmp-list-hdr{padding:12px 14px;border-bottom:1px solid #f0f4f5;border-radius:14px 14px 0 0;display:flex;flex-direction:column;gap:8px;width:100%}
.cmp-list-title{font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:800;color:#1a2e30}
.cmp-search{padding:7px 12px;border:1.5px solid #e2eaeb;border-radius:99px;font-size:12px;outline:none;width:100%}
.cmp-list-scroll{max-height:420px;overflow-y:auto;border-radius:0 0 14px 14px}
.cmp-item{display:flex;gap:8px;align-items:flex-start;padding:9px 14px;border-bottom:1px solid #f8fafb}
.cmp-item:last-child{border-bottom:none}
.cmp-item:hover{background:#f8fbfb}
.cmp-arrow{color:#507c80;font-size:13px;flex-shrink:0;margin-top:2px}
.cmp-text{font-size:13px;color:#1a2e30;line-height:1.5;word-wrap:break-word;overflow-wrap:break-word;min-width:0;flex:1}

.fade-up{animation:fadeUp .4s cubic-bezier(.22,.68,0,1.2) both}
.dd-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;font-size:13px;line-height:1.4;color:#1a2e30;word-wrap:break-word}
</style>
</head>

  <div class="nav-inner">

      <div class="nav-dot"></div>

<script type="text/babel">
const {useState}=React;
const COUNTRIES=[["Algeria","DA"],["Angola","Kz"],["Benin","CFA"],["Botswana","P"],["Burkina Faso","CFA"],["Burundi","Fr"],["Cabo Verde","Esc"],["Cameroon","CFA"],["Central African Republic","CFA"],["Chad","CFA"],["Comoros","Fr"],["Congo DR","FC"],["Congo Republic","CFA"],["Côte d'Ivoire","CFA"],["Djibouti","Fr"],["Egypt","E£"],["Equatorial Guinea","CFA"],["Eritrea","Nfk"],["Eswatini","L"],["Ethiopia","Br"],["Gabon","CFA"],["Gambia","D"],["Ghana","GH₵"],["Guinea","Fr"],["Guinea-Bissau","CFA"],["Kenya","KSh"],["Lesotho","L"],["Liberia","L$"],["Libya","LD"],["Madagascar","Ar"],["Malawi","MK"],["Mali","CFA"],["Mauritania","UM"],["Mauritius","₨"],["Morocco","MAD"],["Mozambique","MT"],["Namibia","N$"],["Niger","CFA"],["Nigeria","₦"],["Rwanda","Fr"],["São Tomé and Príncipe","Db"],["Senegal","CFA"],["Seychelles","₨"],["Sierra Leone","Le"],["Somalia","Sh"],["South Africa","R"],["South Sudan","£"],["Sudan","£"],["Tanzania","TSh"],["Togo","CFA"],["Tunisia","DT"],["Uganda","USh"],["Zambia","ZK"],["Zimbabwe","Z$"]];
const getSym=c=>(COUNTRIES.find(x=>x[0]===c)||["","₦"])[1];
const applyS=(t,s)=>typeof t==="string"?t.replace(/₦/g,s):t;

const CORE_SECTIONS=[
  {id:"mindset",title:"The Right Mindset",items:[
    {type:"intro",text:"Your customer's experience decides whether they come back, and whether they tell others about you. In Africa, word of mouth travels faster than any advert. One person treated badly can cost you ten customers. One person treated well can bring you twenty."},
    {type:"rule",title:"The customer is not always right, but they always deserve respect",body:"You do not have to agree with every complaint. But every complaint deserves a calm, respectful response. Even if they are rude, your professionalism is what separates your business from the competition."},
    {type:"rule",title:"Your reaction is your brand",body:"If you insult a customer on WhatsApp, that screenshot will exist forever. If you calm them down and solve their problem, that story will be told for free. Treat every interaction like the whole market is watching."},
    {type:"rule",title:"Speed matters more than perfection",body:"A quick 'I have seen your message and I am looking into it' beats a perfect response that comes two days later. People want to feel heard first. Solutions come second."},
    {type:"rule",title:"Repeat customers are your real income",body:"Getting a new customer costs money. Keeping an existing customer costs almost nothing. Your customer service is your most affordable marketing strategy."},
  ]},
  {id:"scripts",title:"Core Scripts",items:[
    {type:"intro",text:"These are ready-to-use messages. Copy them, edit your business name, and send. They are written in a tone that is professional but natural."},
    {type:"script",tag:"Angry customer",tagColor:"#c0392b",scenario:"Someone messages you shouting about a problem; delivery late, product not as described, service not done well.",wrong:"That is not my fault. I told you the product is like that. Please stop disturbing me.",right:"I am really sorry you are experiencing this. I understand how frustrating this is and I take it seriously. Please give me [timeframe] to look into this and get back to you with a proper resolution. I will not let this go unresolved.",tip:"Never argue. Acknowledge the feeling first, then address the issue."},
    {type:"script",tag:"Customer is wrong about facts",tagColor:"#e65100",scenario:"A customer claims something that is not accurate; wrong price, wrong order, wrong expectation.",wrong:"That is not what I said. Look at what I posted. You did not read properly.",right:"I completely understand the confusion. Let me clarify what was agreed: [explain clearly]. I want to make sure we are both on the same page so we can sort this out quickly.",tip:"Correct without accusing. Use 'I want to clarify' not 'you are wrong'."},
    {type:"script",tag:"Refund request",tagColor:"#7b1fa2",scenario:"Customer wants their money back.",wrong:"We do not do refunds. It is stated clearly on our page. Nothing I can do.",right:"Thank you for reaching out about this. I want to understand what went wrong first so I can offer you the best resolution. Depending on what happened, I can offer you [option A] or [option B]. My priority is making sure you are satisfied.",tip:"Even if your policy is no refunds, always listen first and offer an alternative."},
    {type:"script",tag:"Price too high",tagColor:"#507c80",scenario:"Someone says they can get it cheaper elsewhere.",wrong:"Then go and buy from them. My price is my price.",right:"I appreciate your honesty. My price reflects [quality of materials, time, skill involved]. I do not compromise on that because I want you to get real value. However, if budget is a concern, let me see what I can do.",tip:"Never apologise for your price. Explain what they are paying for."},
    {type:"script",tag:"Following up after purchase",tagColor:"#27ae60",scenario:"2 to 3 days after a customer receives their order.",wrong:"(no message at all)",right:"Hi [Name]! This is [Your Name] from [Business Name]. I just wanted to check in and make sure you are happy with [product or service]. Please let me know if there is anything you need.",tip:"Most businesses never follow up. This one message alone will make you stand out."},
    {type:"script",tag:"Customer went quiet after pricing",tagColor:"#888",scenario:"They asked for price, you replied, they went quiet.",wrong:"Hello? Hello? Are you still interested? (multiple messages)",right:"Hi [Name], just checking in to see if you had any questions about the pricing I shared. No pressure at all, I am here whenever you are ready.",tip:"One gentle follow-up only. After that, leave them. Chasing makes you look desperate."},
  ]},
  {id:"channels",title:"WhatsApp, DMs and Calls",items:[
    {type:"intro",text:"In Africa, most of your customer communication will happen on WhatsApp. How you manage it directly affects how professional your business looks."},
    {type:"tip",title:"Set a business tone on WhatsApp from day one",body:"Use a clear business name and profile photo. Set a greeting message for new contacts. Keep your status updated with current offerings. Never use personal WhatsApp for business if you can avoid it; get WhatsApp Business."},
    {type:"tip",title:"Response time is a silent promise",body:"If you reply within an hour, customers expect that always. Set a realistic standard and stick to it. If you are unavailable, set an auto-reply: 'Thank you for reaching out. I will respond within [X hours].'"},
    {type:"tip",title:"Voice notes; use them carefully",body:"Many customers prefer voice notes. They are fine for friendly conversations. But for complaints, pricing, or any disagreement, stick to typed messages. Typed messages are clear, professional, and cannot be misquoted."},
    {type:"tip",title:"Phone calls; always answer professionally",body:"Never pick up a business call with 'hello?' Pick up with: 'Good [morning or afternoon], this is [name] from [business name], how can I help you?' It takes two seconds and instantly elevates your brand."},
    {type:"tip",title:"When a call gets heated",body:"Lower your voice. Do not match their energy. Say: 'I can hear that you are upset and I completely understand. Can I call you back in 10 minutes once I have pulled up your details?'"},
  ]},
  {id:"loyalty",title:"Building Loyal Customers",items:[
    {type:"intro",text:"The goal is not just to make a sale. The goal is to make a customer. A loyal customer buys again, refers others, and defends your business when others talk badly about it."},
    {type:"practice",title:"Remember names and preferences",body:"When a customer comes back, use their name. Say 'Last time you ordered the [X], would you like the same?' This takes almost no effort and creates a feeling of being valued."},
    {type:"practice",title:"Celebrate with them",body:"Birthday? Send a simple message and a small discount. Just delivered a baby? Congratulate them. People buy from people they feel connected to."},
    {type:"practice",title:"Create a simple loyalty structure",body:"'Buy 5, get 1 free.' 'Refer a friend and get 10% off.' You do not need an app. A WhatsApp note or a manual tally works just as well when you are starting."},
    {type:"practice",title:"Ask for feedback and actually use it",body:"'I want to keep improving, what could I have done better?' This question makes customers feel like partners. The ones who give feedback are giving you free consulting."},
    {type:"practice",title:"Do small unexpected things",body:"An extra item in the bag. A handwritten thank you note. Free packaging upgrade. These cost almost nothing and produce outsized loyalty. Nobody expects them. That is exactly why they work."},
  ]},
  {id:"dos",title:"Do and Do Not",items:[
    {type:"dosdonts",
     dos:["Always respond within a reasonable time","Acknowledge the customer's feeling before solving the problem","Use the customer's name when you know it","Keep a record of complaints and how you resolved them","Apologise when you are wrong, clearly and directly","Follow up after every order","Ask for reviews from happy customers","Treat every interaction like the whole market is watching","Underpromise and overdeliver","Maintain the same tone for small and large orders"],
     donts:["Do not argue; you will win the argument and lose the customer","Do not use capitals when responding to complaints (reads as shouting)","Do not post about difficult customers publicly, ever","Do not make promises you cannot keep just to calm someone down","Do not ignore complaints hoping they go away","Do not be sarcastic, even if the customer is unreasonable","Do not give different prices without reason","Do not keep customers waiting without acknowledgement","Do not apologise without also offering a solution","Do not let emotions run your responses"]}
  ]},
];

const COMPLAINT_CATS=[
  {id:"time",title:"Time, Delays and Availability",tagColor:"#e65100",
   intro:"Customers get most frustrated when you waste their time or disappear without explanation. This is one of the most common reasons people stop buying from a business.",
   complaints:["Service took much longer than promised","Long wait times without explanation or apology","Delivery delayed or never happened","Business closed early or unexpectedly unavailable","Vendor late to appointments","Inconsistent opening hours announced","Vendor cancels last minute often","Vendor ghosts after partial payment","Vendor overbooks and disappoints","Service dragged out unnecessarily","No plan for common disruptions like rain or traffic","Delivery excuses always: traffic, fuel, etc.","No updates or tracking for orders","Vendor overwhelmed and shows it","Business lacks structure or organisation","Business relocated without informing customers","Vendor disappeared mid-process","Lacks basic tools or equipment on the day","Vendor closes unexpectedly during peak times","Business owners not helping customers understand delivery problems"],
   scripts:[
     {tag:"Delayed service or delivery",right:"I sincerely apologise for this delay. I know your time is valuable and this was not the experience I want to give you. Here is exactly what happened: [brief honest explanation]. Your [order or service] will be ready by [new specific time]. If this does not work for you, please let me know and we will work out a solution together.",principle:"Give a specific new time. Not 'soon'. Not 'shortly'. A date and time. Then honour it."},
     {tag:"Business unexpectedly unavailable",right:"I am so sorry I was not available at the time you came or reached out. This was not professional of me and I completely understand your frustration. [Brief honest reason]. I would like to make it up to you; can we reschedule at a time that works for you?",principle:"Own the absence. Do not over-explain. Offer a concrete next step immediately."},
     {tag:"Delivery that never arrived",right:"I am really sorry about this. I completely understand how unacceptable this is, especially after you have paid. I am looking into what happened right now. I will give you a full update within [X hours] with a clear resolution. You will either receive your order or a full refund.",principle:"Do not ask the customer to wait with no action. Commit to a real resolution with a deadline."},
   ]},
  {id:"comms",title:"Communication and Responsiveness",tagColor:"#1565c0",
   intro:"Silence after payment is one of the fastest ways to lose a customer's trust forever. Poor communication makes customers feel ignored, disrespected and anxious about their money.",
   complaints:["No response to messages or calls after payment","Poor social media replies or ignoring DMs","Blocks negative feedback online","Vendor threatens or blocks complainers online","Communication barrier or poor explanation","Vendor interrupts customer often","Vendor talks too much, listens little","Vendor ignores repeated requests","Inconsistent pricing day-to-day","No clear pricing list displayed","No system for bookings or appointments","Poor response to feedback","No transparency in process or costs","No proper records; disputes over payments and orders","Vendor does not update on progress","No clear terms for services","Vendor favors certain customers over others","Responds to positive comments but ignores complaints publicly"],
   scripts:[
     {tag:"Not responding after payment",right:"I am so sorry for going quiet on you; this was wrong of me and I completely understand why you are frustrated. I have your order and I am updating you now: [status]. You will hear from me with a full update by [specific time]. Going forward I will always keep you informed.",principle:"No excuse is good enough for silence after payment. Address it directly, update them immediately, give a specific time for the next update."},
     {tag:"Blocking or removing a complaint",right:"You were right to flag that. I should not have removed your comment; that was the wrong response. I want to address your concern directly and openly. [Address the issue here]. My business is built on trust and I want to earn yours back.",principle:"Never block a genuine complaint. It escalates the situation and damages your reputation publicly."},
     {tag:"Customer feels ignored",right:"I hear you and I am truly sorry you have had to repeat yourself. That is not the experience I want to give you. I am giving your issue my full attention right now. [Respond to the actual issue]. I will follow up to make sure this is fully resolved.",principle:"Acknowledge the repetition. Do not make the customer feel like a problem for following up on their own complaint."},
   ]},
  {id:"quality",title:"Quality, Accuracy and Execution",tagColor:"#c0392b",
   intro:"When the customer receives something different from what was shown or described, trust breaks immediately. Your photos, descriptions and promises must match reality exactly.",
   complaints:["Quality much lower than what was shown or described","Wrong item or service provided despite clear instructions","Substandard tools or materials used visibly","Fake or misleading photos and descriptions used","Overhyped online but reality disappoints","Obvious lack of training or skill gaps","Uses low-quality substitutes without notice","Service inconsistent across visits","Poor finishing or attention to detail","Product expired or near expiry when sold","Short measure or quantity less than paid for","Service quality dropped after building trust","Vendor not knowledgeable about own product","Posts fake testimonials or fake before and afters","Packaging fails causing mess or damage","Sends wrong variant or version","Causes more issues while fixing one","Vendor rushed service to fit own schedule","Service felt impersonal with no care","Item damaged or faulty on delivery"],
   scripts:[
     {tag:"Quality lower than expected",right:"I am sorry this did not meet the standard you were expecting based on what was shown. That is my responsibility to correct. I would like to [redo it, replace it, or refund it]. Can you share photos of what you received so I can see exactly what went wrong? This will not be left unresolved.",principle:"Do not defend the product if it clearly does not match what was advertised. Own it."},
     {tag:"Wrong item delivered",right:"I sincerely apologise for this mistake; you gave me clear instructions and I did not follow them correctly. That is entirely on me. I will correct this immediately at no extra cost or inconvenience to you. I am sorry for wasting your time.",principle:"There is no version of 'you are wrong about what you ordered' that helps here. If it is clearly wrong, own it completely."},
     {tag:"Suspected misleading marketing",right:"I take this very seriously. My business does not use fabricated content. [Explain what the content actually is; real client, real result]. If there is any confusion about what I offer versus what I deliver, I am happy to clarify before you proceed.",principle:"If you use real photos and real results, say so clearly and be ready to show more."},
   ]},
  {id:"pricing",title:"Pricing, Payments and Transparency",tagColor:"#7b1fa2",
   intro:"Anything that feels like hidden money or surprise charges creates immediate distrust. Be transparent upfront. Customers do not mind paying, they mind being surprised.",
   complaints:["Extra charges added without prior notice","Hidden fees or extras not mentioned upfront","Pricing changed suddenly from agreed amount","No receipt or proof of transaction given","Charges extra for small additions","Hidden conditions on offers and promos","Vendor demands full payment before starting with no guarantee","No refund policy communicated clearly","Overprices consistently for poor effort","Vendor pushes for tips aggressively","Borrows change from customer informally","Pricing inconsistent day to day","Overpromises discounts that disappear","Vendor exploits urgency to charge more"],
   scripts:[
     {tag:"Unexpected charges added",right:"I understand your concern and I completely see why this feels unfair. I should have been clearer about [the specific charge] upfront before we started. What I am willing to do is [waive it, explain it clearly, or adjust the final amount]. Going forward I will always discuss every cost before proceeding.",principle:"Extra charges without prior agreement will feel like a scam even if they are legitimate. Always communicate costs upfront."},
     {tag:"Quoted price changed",right:"I apologise for the confusion. The price I quoted was [amount] and that is what I will honour. If there is a discrepancy, I want to sort it out now; not have you feel uncertain about what you are paying.",principle:"If you made a mistake in your quote, it is usually better to honour the lower price than to damage the customer relationship."},
     {tag:"No receipt given",right:"You are absolutely right to ask for one. I will send you a receipt now. [Send payment confirmation immediately.] Going forward I will always provide proof of payment with every transaction.",principle:"A receipt is basic. It protects both you and the customer."},
   ]},
  {id:"attitude",title:"Attitude and Professionalism",tagColor:"#e65100",
   intro:"Customers can forgive a mistake. They rarely forgive being disrespected. Your attitude is the single most powerful factor in whether a customer returns or tells people to avoid you.",
   complaints:["Rude or dismissive attitude when complained to","Vendor on phone the whole time, ignoring customer","Vendor argues during bargaining or complaints","Vendor blames customer for vendor's own mistakes","Vendor complains about economy or hardship to customers","Judgmental attitude toward customer choices","Vendor gossips about other customers","Vendor emotional or dramatic in responses","Vendor loses temper easily","No greeting or farewell routine","Vendor seems uninterested or bored","Vendor's family member or helper rude to customers","Vendor smokes or eats near workspace","Poor body language; sighs, eye rolls, visible impatience","Vendor interrupts customer constantly","Vendor defensive instead of helpful","Vendor escalates minor issues unnecessarily"],
   scripts:[
     {tag:"After being rude or dismissive",right:"I owe you an apology. The way I responded to you was not acceptable and it does not reflect how I want to treat the people who support my business. I am sorry. Your concern was valid and I should have handled it with more respect and professionalism. I want to make this right.",principle:"Apologise without conditions. Do not say 'I am sorry but...'; the 'but' cancels the apology."},
     {tag:"Customer witnesses your helper being rude",right:"I am so sorry you experienced that. That behaviour does not represent my business or my standards. I will address it directly. Please know that you deserve to be treated with full respect every single time you interact with my business.",principle:"Never defend a rude helper or family member to a customer. Their conduct is your responsibility."},
     {tag:"Customer feels looked down on",right:"I am truly sorry if I made you feel that way; that was never my intention and it was wrong regardless of intent. Every customer deserves to be treated with equal respect and care, no matter what they are buying or how much they are spending. I will do better.",principle:"Classism and judgment are real and customers feel it. If a customer says they felt looked down on, take it seriously."},
   ]},
  {id:"afterservice",title:"After-Service Care",tagColor:"#00695c",
   intro:"What happens after the sale defines whether someone becomes a loyal customer or a one-time transaction. Most businesses stop caring after the payment clears. The ones that keep going are the ones that grow.",
   complaints:["No follow-up or after-service care provided","No warranty or guarantee honoured","Vendor promises 'next time' without delivering","No genuine interest in whether customer was satisfied","Service quality dropped after initial trust was built","Vendor ignores feedback after first few purchases","No improvement despite repeated complaints","Vendor favors new customers over loyal ones","No reward or recognition for repeat customers","Service inconsistent; excellent first time, disappointing after","Vendor defensive when loyal customer raises concern","No record of past customer preferences","Vendor forgets orders or important details repeatedly","No thank you or appreciation shown after purchase","Service feels impersonal and cold over time","Vendor stops putting in effort after customer commits to using them"],
   scripts:[
     {tag:"Loyal customer disappointed after good start",right:"I hear you and I am genuinely sorry. You have been with me from early on and you deserve consistency, not declining service. The fact that your experience has dropped is something I need to take seriously. I am going to [specific action] and I want to rebuild the level of service you had from the beginning. Thank you for telling me instead of just leaving.",principle:"Loyal customers who complain are giving you a gift. They still care enough to say something. Do not take that lightly."},
     {tag:"No after-service care was given",right:"I should have followed up with you after [your order or service] and I did not. That was a gap in how I run my business and I am fixing it. How was your experience? Is there anything I can do to improve it for next time?",principle:"Following up costs nothing and creates enormous goodwill. Add it to your routine, not your exceptions."},
   ]},
];

function ScriptCard({s,sym}){
  const [open,setOpen]=useState(false);
  return(
    <div className={"sc"+(open?" open":"")}>
      <button className="sc-btn" onClick={()=>setOpen(o=>!o)}>
        <span className="sc-tag" style={{background:s.tagColor||"#507c80"}}>{s.tag}</span>
        {!open&&<span className="sc-preview">{(s.scenario||s.tag).slice(0,55)}...</span>}
        <svg width="14" height="14" style={{color:"#94a3b8",transform:open?"rotate(180deg)":"none",transition:"transform .2s",flexShrink:0,marginLeft:"auto"}} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/></svg>
      </button>
      {open&&<div className="sc-body">
        {s.scenario&&<div className="sc-scenario">{s.scenario}</div>}
        {s.wrong?(
          <div className="sc-scripts">
            <div className="sc-no"><div className="sc-lbl" style={{color:"#dc2626"}}>Do not say this</div><div className="sc-quote" style={{color:"#dc2626"}}>"{applyS(s.wrong,sym)}"</div></div>
            <div className="sc-yes"><div className="sc-lbl" style={{color:"#16a34a"}}>Say this instead</div><div className="sc-quote" style={{color:"#166534"}}>"{applyS(s.right,sym)}"</div></div>
          </div>
        ):(
          <div className="sc-yes" style={{marginBottom:12}}><div className="sc-lbl" style={{color:"#16a34a"}}>What to say</div><div className="sc-quote" style={{color:"#166534"}}>"{applyS(s.right,sym)}"</div></div>
        )}
        <div className="sc-principle"><b style={{color:"#507c80"}}>Key principle: </b>{applyS(s.tip||s.principle||"",sym)}</div>
      </div>}
    </div>
  );
}

function CoreContent({sec,sym}){
  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      {sec.items.map((item,i)=>{
        if(item.type==="intro")return<div key={i} className="card card-teal-left" style={{fontSize:14,color:"#3a5c60",lineHeight:1.7}}>{applyS(item.text,sym)}</div>;
        if(item.type==="rule")return<div key={i} className="card"><div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,color:"#1a2e30",fontSize:15,marginBottom:6}}>{item.title}</div><div style={{fontSize:13,color:"#4a6b70",lineHeight:1.65}}>{applyS(item.body,sym)}</div></div>;
        if(item.type==="script")return<ScriptCard key={i} s={item} sym={sym}/>;
        if(item.type==="tip")return<div key={i} className="card card-teal-left"><div style={{fontWeight:800,color:"#1a2e30",fontSize:14,marginBottom:4}}>{item.title}</div><div style={{fontSize:13,color:"#4a6b70",lineHeight:1.6}}>{applyS(item.body,sym)}</div></div>;
        if(item.type==="practice")return<div key={i} className="card" style={{display:"flex",gap:14,alignItems:"flex-start"}}><div style={{width:30,height:30,borderRadius:9,background:"#507c80",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,flexShrink:0}}>{i}</div><div><div style={{fontWeight:800,color:"#1a2e30",fontSize:14,marginBottom:4}}>{item.title}</div><div style={{fontSize:13,color:"#4a6b70",lineHeight:1.6}}>{applyS(item.body,sym)}</div></div></div>;
        if(item.type==="dosdonts")return(
          <div key={i} className="dd-grid">
            <div className="card"><div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:"#16a34a",marginBottom:12}}>Do these</div>{item.dos.map((d,j)=><div key={j} className="dd-item"><span style={{color:"#16a34a",flexShrink:0}}>✓</span><span>{applyS(d,sym)}</span></div>)}</div>
            <div className="card"><div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:"#dc2626",marginBottom:12}}>Avoid these</div>{item.donts.map((d,j)=><div key={j} className="dd-item"><span style={{color:"#dc2626",flexShrink:0}}>✗</span><span>{applyS(d,sym)}</span></div>)}</div>
          </div>
        );
        return null;
      })}
    </div>
  );
}

function ComplaintView({cat,sym}){
  const [search,setSearch]=useState("");
  const filtered=search?cat.complaints.filter(c=>c.toLowerCase().includes(search.toLowerCase())):cat.complaints;
  return(
    <div className="fade-up">
      <div className="dark-banner">
        <div className="dark-banner-grid"/>
        <div className="dark-banner-inner">
          <div className="dark-banner-title">{cat.title}</div>
          <p className="dark-banner-desc">{cat.intro}</p>
        </div>
      </div>
      <div className="cmp-layout">
        <div className="cmp-list-box">
          <div className="cmp-list-hdr">
            <div className="cmp-list-title">Complaint types <span style={{fontSize:12,color:"#507c80",fontWeight:700}}>({filtered.length})</span></div>
            <input className="cmp-search" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search complaints..."/>
          </div>
          <div className="cmp-list-scroll">
            {filtered.map((c,i)=>(
              <div key={i} className="cmp-item">
                <span className="cmp-arrow">›</span>
                <span className="cmp-text">{c}</span>
              </div>
            ))}
            {filtered.length===0&&<div style={{padding:"20px 14px",fontSize:13,color:"#94a3b8",textAlign:"center"}}>No matching complaints</div>}
          </div>
        </div>
        <div>
          <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:14,fontWeight:800,color:"#1a2e30",marginBottom:12}}>Response scripts</div>
          {cat.scripts.map((s,i)=><ScriptCard key={i} s={{...s,tagColor:cat.tagColor}} sym={sym}/>)}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [country,setCountry]=useState("Nigeria");
  const sym=getSym(country);
  const [mainTab,setMainTab]=useState("core");
  const [coreTab,setCoreTab]=useState(0);
  const [cmpTab,setCmpTab]=useState(0);
  const totalC=COMPLAINT_CATS.reduce((a,c)=>a+c.complaints.length,0);
  return(
    <div style={{minHeight:"100vh",background:"#f0f4f5"}}>
      <div className="hero">
        <div className="hero-grid"/>
        <div className="hero-glow"/>
        <div className="hero-inner">
          <div className="hero-row">
            <div>
              <div className="hero-eyebrow">Prowess Digital Solutions · 2026</div>
              <h1 className="hero-title">Customer Service <span>Mastery</span></h1>
              <p className="hero-desc">{totalC}+ real complaint scenarios with scripts. Written for the African market.</p>
            </div>
            <select className="hero-select" value={country} onChange={e=>setCountry(e.target.value)}>
              {COUNTRIES.map(([n])=><option key={n}>{n}</option>)}
            </select>
          </div>
        </div>
      </div>

      <div className="tab-bar" style={{position:"sticky",top:46,zIndex:50,borderBottom:"1.5px solid #e2eaeb"}}>
        <div className="tab-bar-inner" style={{padding:"0 8px"}}>
          {[["core","Core Principles"],["complaints","Complaints Library"]].map(([v,l])=>(
            <button key={v} className={"main-tab-btn"+(mainTab===v?" on":"")} onClick={()=>setMainTab(v)}>{l}</button>
          ))}
        </div>
      </div>

      {mainTab==="core"&&<>
        <div className="tab-bar">
          <div className="tab-bar-inner">
            {CORE_SECTIONS.map((s,i)=>(
              <button key={i} className={"tab-btn"+(coreTab===i?" on":"")} onClick={()=>setCoreTab(i)}>{s.title}</button>
            ))}
          </div>
        </div>
        <div className="page-content">
          <div className="dark-banner">
            <div className="dark-banner-grid"/>
            <div className="dark-banner-inner"><div className="dark-banner-title">{CORE_SECTIONS[coreTab].title}</div></div>
          </div>
          <CoreContent sec={CORE_SECTIONS[coreTab]} sym={sym}/>
        </div>
      </>}

      {mainTab==="complaints"&&<>
        <div className="tab-bar">
          <div className="tab-bar-inner">
            {COMPLAINT_CATS.map((cat,i)=>(
              <button key={i} className={"tab-btn"+(cmpTab===i?" on":"")} onClick={()=>setCmpTab(i)}>
                {cat.title.split(",")[0]}
                <span className="tab-count">{cat.complaints.length}</span>
              </button>
            ))}
          </div>
        </div>
        <div className="page-content">
          <ComplaintView cat={COMPLAINT_CATS[cmpTab]} sym={sym}/>
        </div>
      </>}

      <div style={{textAlign:"center",padding:"24px 16px",fontSize:12,color:"#94a3b8"}}>© 2026 Prowess Digital Solutions · prowessdigitalsolutions.com</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
