<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Starter Checklist · Prowess Digital Solutions</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f4f6f7;min-height:100vh}
input,select,textarea{font-size:16px !important;}
.pds-nav{background:#0c1a1b;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.06)}
.pds-nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.pds-nav-dot{width:8px;height:8px;border-radius:50%;background:#507c80;box-shadow:0 0 10px rgba(80,124,128,.7);animation:navPulse 2.5s ease-in-out infinite}
@keyframes navPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
.pds-nav-name{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,.7)}
.pds-nav-right{display:flex;align-items:center;gap:12px}
.pds-nav-back{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.55);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;text-decoration:none;transition:background .2s,color .2s}
.pds-nav-back:hover{background:rgba(255,255,255,.1);color:#fff}
.pds-nav-badge{padding:5px 11px;border-radius:20px;background:rgba(46,160,67,.15);border:1px solid rgba(46,160,67,.25);color:#4cba6f;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
</style>
</head>
<body>
<div class="pds-nav">
  <a href="/" class="pds-nav-brand">
    <div class="pds-nav-dot"></div>
    <span class="pds-nav-name">Prowess Digital Solutions</span>
  </a>
  <div class="pds-nav-right">
    <span class="pds-nav-badge">Free Tool</span>
    <a href="/tools" class="pds-nav-back">← All Tools</a>
  </div>
</div>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const B="#507c80",DARK="#3a5c60",MID="#6a9ea3",LITE="#e8f4f5",LGRAY="#f4f6f7",MGRAY="#c8d8da",W="#fff";

const CATS=[
  {title:"Business Registration & Legal",desc:"The legal basics that protect you and make your business legitimate.",items:["Business name registered with the CAC (Corporate Affairs Commission)","Business structure decided (sole proprietorship, LLC, partnership, etc.)","TIN (Tax Identification Number) obtained from FIRS","Business bank account opened in the registered business name","Relevant industry permits or licences obtained (if applicable)","Basic contract or service agreement template prepared for clients"]},
  {title:"Business Clarity & Direction",desc:"The foundational thinking that determines whether your business has real direction.",items:["Clear description of what your business does (in one or two sentences)","Target audience defined (who exactly you serve and why)","Core services or products clearly listed with pricing","Revenue model defined (how you actually make money)","Short term goals set for the next 3 to 6 months","Long term vision documented (where you want the business to be in 2 to 3 years)"]},
  {title:"Financial Foundation",desc:"The money systems that keep you informed and in control.",items:["Income and expenses being tracked consistently (even a simple spreadsheet)","Pricing structured to cover costs and generate profit","Separate personal and business finances","Basic budget or financial plan in place for the next quarter","Invoicing system set up (even a simple template)","Emergency fund or reserve started for the business"]},
  {title:"Operations & Systems",desc:"The internal processes that keep your business running without chaos.",items:["Client onboarding process defined (what happens when someone pays)","Service delivery process documented (how work gets done, start to finish)","Communication channels decided (email, WhatsApp, Slack, etc.) with clear purpose for each","File storage organised (Google Drive, Dropbox, or similar) with a naming convention","Basic project or task management system in use","At least one key process written as a simple SOP"]},
  {title:"Brand & Online Presence",desc:"How people find you and what impression they get when they do.",items:["Professional logo and basic brand identity in place","Business website live with clear service descriptions","Google Business Profile set up and verified","Active on at least one social media platform relevant to your audience","Contact information easy to find (email, phone, WhatsApp)","Client testimonials or case studies collected (even one or two)"]},
  {title:"Team & Growth Readiness",desc:"The structural pieces that determine whether growth will help or hurt you.",items:["Roles and responsibilities defined (even if you are the only person)","Decision making process clear (who decides what)","Delegation plan in place or identified (what can be handed off first)","Skills gap identified (what you need but do not currently have)","Basic onboarding process ready for when you hire or bring on help","Growth priorities ranked (what to focus on next, and what to wait on)"]},
];

function App(){
  const [checked,setChecked]=useState({});
  const [open,setOpen]=useState(0);
  const total=CATS.reduce((s,c)=>s+c.items.length,0);
  const done=Object.values(checked).filter(Boolean).length;
  const pct=Math.round(done/total*100);
  const toggle=k=>setChecked(p=>({...p,[k]:!p[k]}));
  const catDone=i=>CATS[i].items.filter((_,j)=>checked[`${i}-${j}`]).length;
  const label=pct===100?"Your foundations are solid. Time to grow with confidence.":pct>=75?"Strong foundation. A few gaps to close before scaling.":pct>=50?"Decent progress. Focus on the unchecked items before chasing growth.":pct>=25?"Early stages. Prioritise the basics before investing further.":"Just getting started. Work through this list before making big moves.";

  return <div style={{maxWidth:720,margin:"0 auto",padding:"32px 16px 60px"}}>
    <div style={{marginBottom:32}}>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:MID,marginBottom:10}}>Prowess Digital Solutions</div>
      <h1 style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:"clamp(26px,5vw,40px)",fontWeight:800,color:DARK,lineHeight:1.1,letterSpacing:"-0.5px",marginBottom:12}}>African Small Business<br/>Starter Checklist</h1>
      <p style={{fontSize:15,color:"#64748b",lineHeight:1.7,maxWidth:560}}>Work through the foundational things every business must have before chasing growth. Check off what you have. See where the gaps are.</p>
    </div>

    <div style={{background:W,borderRadius:20,padding:"24px 28px",boxShadow:"0 2px 20px rgba(58,92,96,.08)",border:`1px solid ${MGRAY}`,marginBottom:24}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div>
          <div style={{fontSize:12,color:"#94a3b8",fontWeight:600,marginBottom:4}}>Your Progress</div>
          <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:32,fontWeight:800,color:DARK}}>{done} <span style={{fontSize:18,fontWeight:500,color:"#94a3b8"}}>/ {total}</span></div>
        </div>
        <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:44,fontWeight:800,color:B}}>{pct}%</div>
      </div>
      <div style={{height:10,background:LGRAY,borderRadius:99,overflow:"hidden",marginBottom:12}}>
        <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${B},${MID})`,borderRadius:99,transition:"width .5s ease"}}/>
      </div>
      <div style={{fontSize:13,color:"#64748b",lineHeight:1.6}}>{label}</div>
      {done>0&&<button onClick={()=>setChecked({})} style={{marginTop:10,fontSize:12,color:"#94a3b8",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Reset checklist</button>}
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {CATS.map((cat,ci)=>{
        const d=catDone(ci);const complete=d===cat.items.length;const isOpen=open===ci;
        return <div key={ci} style={{borderRadius:16,border:`1px solid ${complete?"rgba(80,124,128,.3)":MGRAY}`,background:complete?"rgba(80,124,128,.04)":W,overflow:"hidden",boxShadow:"0 1px 8px rgba(0,0,0,.04)"}}>
          <button onClick={()=>setOpen(isOpen?null:ci)} style={{width:"100%",padding:"18px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:36,height:36,borderRadius:10,background:complete?B:LGRAY,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:complete?W:"#94a3b8",flexShrink:0}}>{complete?"✓":ci+1}</div>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:DARK}}>{cat.title}</div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{d} of {cat.items.length} complete</div>
              </div>
            </div>
            <svg style={{width:18,height:18,color:"#94a3b8",transform:isOpen?"rotate(180deg)":"",transition:"transform .2s",flexShrink:0}} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/></svg>
          </button>
          {isOpen&&<div style={{borderTop:`1px solid ${LGRAY}`,padding:"4px 20px 20px"}}>
            <p style={{fontSize:13,color:"#64748b",margin:"12px 0 14px",lineHeight:1.6}}>{cat.desc}</p>
            {cat.items.map((item,ii)=>{const k=`${ci}-${ii}`;const ck=!!checked[k];return(
              <label key={k} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 12px",borderRadius:12,cursor:"pointer",background:ck?"rgba(80,124,128,.05)":"transparent",marginBottom:4,transition:"background .15s"}}>
                <input type="checkbox" checked={ck} onChange={()=>toggle(k)} style={{width:18,height:18,marginTop:1,accentColor:B,flexShrink:0,cursor:"pointer"}}/>
                <span style={{fontSize:13,color:ck?"#94a3b8":DARK,lineHeight:1.6,textDecoration:ck?"line-through":"none"}}>{item}</span>
              </label>
            );})}
          </div>}
        </div>;
      })}
    </div>

    <div style={{marginTop:32,background:W,borderRadius:20,padding:"28px",border:`1px solid ${MGRAY}`,textAlign:"center",boxShadow:"0 2px 20px rgba(58,92,96,.08)"}}>
      <p style={{fontSize:14,color:"#64748b",lineHeight:1.7,marginBottom:18}}>Found gaps? That is completely normal. A clarity session can help you prioritise what to fix first and build a plan that fits your current resources.</p>
      <a href="/consultation" style={{display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"13px 26px",background:B,color:W,borderRadius:12,fontWeight:700,fontSize:14,textDecoration:"none",fontFamily:"'DM Sans',sans-serif"}}>Book a Clarity Session →</a>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
